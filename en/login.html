<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080909;--surface:#0f1010;--card:#131414;
  --border:#1c1e1e;--border2:#252727;
  --text:#e8eaea;--text2:#7a8080;--text3:#8a9090;
  --accent:#b8ff57;--accent2:#7ddd1a;
  --danger:#ff4444;--success:#2dd4a0;
  --mono:'Space Mono',monospace;--display:'Anton',sans-serif;
  --r:6px;--r2:12px
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(8,9,9,.88);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.nav-logo{font-family:var(--display);font-size:20px;letter-spacing:.04em;color:var(--text);text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-back{font-size:11px;color:var(--text2);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:color .15s}
.nav-back:hover{color:var(--text)}

.wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;position:relative;z-index:1}

.card{
  width:100%;max-width:400px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:40px 36px;
}

.card-title{font-family:var(--display);font-size:32px;letter-spacing:.02em;margin-bottom:6px}
.card-sub{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:32px}

/* TABS */
.tabs{display:flex;gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:28px}
.tab{flex:1;padding:9px;text-align:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:var(--card);color:var(--text2);border:none;font-family:var(--mono);transition:all .15s}
.tab.active{background:var(--bg);color:var(--accent)}

/* SOCIAL BUTTONS */
.social-btn{
  width:100%;display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--card);
  color:var(--text);font-family:var(--mono);font-size:12px;
  cursor:pointer;transition:all .15s;margin-bottom:8px;
  letter-spacing:.02em
}
.social-btn:hover{border-color:var(--border);background:rgba(255,255,255,.04);transform:translateY(-1px)}
.social-btn svg{flex-shrink:0}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:10px;color:var(--text3);letter-spacing:.1em}

/* FORM */
.field{margin-bottom:14px}
.field-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:block}
.field-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 14px;
  font-family:var(--mono);font-size:12px;color:var(--text);
  outline:none;transition:border-color .15s;letter-spacing:.02em
}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--text3)}

/* SUBMIT */
.submit-btn{
  width:100%;padding:13px;
  background:var(--accent);color:#000;
  border:none;border-radius:var(--r);
  font-family:var(--mono);font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.06em;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px
}
.submit-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,255,87,.15)}
.submit-btn:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none;box-shadow:none}

/* MESSAGE */
.msg{font-size:11px;padding:11px 14px;border-radius:var(--r);margin-top:14px;display:none;letter-spacing:.02em}
.msg.success{background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);color:var(--success)}
.msg.error{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.2);color:var(--danger)}

/* FACEIT BUTTON */
.faceit-btn{
  width:100%;display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:var(--r);
  border:1px solid rgba(255,85,0,.3);background:rgba(255,85,0,.08);
  color:#ff5500;font-family:var(--mono);font-size:12px;
  cursor:pointer;transition:all .15s;margin-bottom:8px;
  letter-spacing:.02em
}
.faceit-btn:hover{border-color:rgba(255,85,0,.5);background:rgba(255,85,0,.12);transform:translateY(-1px)}

.switch-link{text-align:center;font-size:11px;color:var(--text3);margin-top:20px}
.switch-link a{color:var(--accent);text-decoration:none}
.switch-link a:hover{text-decoration:underline}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{opacity:0;animation:fadeUp .4s .05s ease forwards}

/* Mobile (cf. ultrareview VIS P0) : avant aucun breakpoint -> overflow
   horizontal garanti sur les ecrans < 640px. */
@media (max-width:640px){
  body{font-size:13px}
  main,.wrap,.container{padding:16px !important;max-width:100% !important}
  .card{padding:18px !important;border-radius:10px}
  h1,h2{font-size:clamp(20px,5vw,26px) !important}
  input,button{font-size:14px} /* anti-zoom iOS sur focus input < 16px */
  button[type="submit"]{width:100%;padding:14px}
}
</style>

<script>
const SUPABASE_URL  = 'https://xmyruycvvkmcwysfygcq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXJ1eWN2dmttY3d5c2Z5Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQzMzcsImV4cCI6MjA4OTUzMDMzN30.TaPIaI7puA3qnIrkHQ-VL9o9QgegmOjJR8yYVYsi8oI';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Capture le referral code depuis ?ref= dans l'URL ───────────────────
// On stocke en localStorage pour survivre au flow email verification
// (l'user clique un lien email, revient sur le site authentifie).
(function captureRefCode() {
  try {
    const params = new URLSearchParams(window.location.search);
    const ref = (params.get('ref') || '').toUpperCase().trim();
    if (/^[A-Z0-9]{6,10}$/.test(ref)) {
      localStorage.setItem('fv_pending_ref', ref);
      console.log('[FragValue] Code parrainage capture :', ref);
    }
  } catch {}
})();

// Active le tab signup si ?signup=1 or ?mode=signup dans l'URL.
// Permet aux CTAs "Start for free" / "Creer un compte" de pointer
// directement vers le formulaire d'inscription au lieu du login.
(function preselectSignupTab() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('signup') === '1' || params.get('mode') === 'signup') {
      // Attendre que le DOM soit pret + switchTab dispo
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof switchTab === 'function') switchTab('signup', null);
      });
    }
  } catch {}
})();

async function attributeReferrer(session) {
  const code = localStorage.getItem('fv_pending_ref');
  if (!code || !session?.access_token) return;
  try {
    const res = await fetch('/api/referral', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token,
      },
      body: JSON.stringify({ code }),
    });
    const d = await res.json();
    if (d.ok) {
      console.log('[FragValue] Parrain enregistre, reward accorde:', d.reward);
      localStorage.removeItem('fv_pending_ref');
      // Flag pour qu'account.html affiche un toast de bienvenue avec le reward
      if (d.reward?.days) {
        sessionStorage.setItem('fv_referral_reward', JSON.stringify({
          days: d.reward.days,
          expires_at: d.reward.expires_at,
          referrer_nick: d.referrer?.nickname || null,
        }));
      }
    } else if (d.code === 'already_referred' || d.code === 'self_referral') {
      // Cas attendus : on nettoie et on flag pour un toast info (si already_referred)
      localStorage.removeItem('fv_pending_ref');
      if (d.code === 'already_referred') {
        sessionStorage.setItem('fv_referral_info', 'already_referred');
      }
    } else if (d.error === 'Unknown code') {
      // Code invalide : on nettoie silencieusement
      localStorage.removeItem('fv_pending_ref');
      sessionStorage.setItem('fv_referral_info', 'invalid_code');
    }
    // Sinon (erreur reseau, etc.) on garde le code pour retry plus tard
  } catch (e) {
    console.warn('[FragValue] Attribution parrain echouee:', e.message);
  }
}

// Rediriger si déjà connecté + lier FACEIT pending
// Choisit la destination post-login : users qui n'ont jamais upload de demo
// atterrissent direct sur /demo.html?welcome=1 pour les guider vers la 1re
// analyse (le "aha moment"). Users qui ont deja des demos : account.html
// (abonnement, historique, parrainage).
async function getPostLoginDestination(userId) {
  try {
    const { count, error } = await _sb
      .from('demos')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', userId);
    if (error) throw error;
    return (count && count > 0) ? 'account.html' : 'demo.html?welcome=1';
  } catch (e) {
    console.warn('[FragValue] count demos failed, fallback account.html:', e.message);
    return 'account.html';
  }
}

_sb.auth.getSession().then(async ({ data }) => {
  if (data.session) {
    await linkPendingFaceit(data.session.user.id);
    await attributeReferrer(data.session);
    // Welcome email + UTM persist : idempotents cote backend, on tente meme
    // si on n'est not sur que c'est un nouveau signup (les endpoints checkent
    // welcome_email_sent_at / signup_at pour ne not dupliquer).
    try {
      const headers = { 'Authorization': 'Bearer ' + data.session.access_token, 'Content-Type': 'application/json' };
      fetch('/api/email-welcome', { method: 'POST', headers }).catch(() => {});
      const utm = (typeof window.fvGetSignupUtm === 'function') ? window.fvGetSignupUtm() : null;
      if (utm) {
        fetch('/api/profile-utm', { method: 'POST', headers, body: JSON.stringify(utm) }).catch(() => {});
      }
    } catch (_) {}
    window.location.href = await getPostLoginDestination(data.session.user.id);
  }
});

// Auto-link FACEIT si pending après login via onAuthStateChange
_sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    await linkPendingFaceit(session.user.id);
    await attributeReferrer(session);
  }
});

async function linkPendingFaceit(userId) {
  const raw = sessionStorage.getItem('pending_faceit_link');
  if (!raw) return;
  try {
    const faceit = JSON.parse(raw);
    await _sb.from('profiles').upsert({
      id: userId,
      faceit_nickname: faceit.nickname,
      faceit_id: faceit.playerId,
      faceit_avatar: faceit.avatar || null,
      faceit_elo: faceit.elo || null,
      faceit_level: faceit.level || null,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'id' });
    sessionStorage.removeItem('pending_faceit_link');
    console.log('[FragValue] FACEIT lie:', faceit.nickname);
  } catch (e) {
    console.warn('Auto-link FACEIT error:', e.message);
  }
}

let mode = 'login';

function switchTab(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.tab')[m==='login'?0:1].classList.add('active');

  const isSignup = m === 'signup';
  document.getElementById('passwordConfirmField').style.display = isSignup ? '' : 'none';
  document.getElementById('submitLabel').textContent = isSignup ? 'Create my account' : 'Sign in';
  document.getElementById('magicLinkRow').style.display = isSignup ? 'none' : '';
  document.getElementById('switchText').innerHTML = isSignup
    ? 'Already have an account? <a href="#" onclick="switchTab(\'login\',null);return false">Sign in</a>'
    : 'No account yet? <a href="#" onclick="switchTab(\'signup\',null);return false">Create account</a>';
  hideMsg();
}

// Regex email RFC 5322 simplifie : accepte user@domain.tld avec sous-domaines.
const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

async function handleSubmit() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passwordInput').value;
  if (!email) { showMsg('Enter your email address.', 'error'); return; }
  if (!EMAIL_REGEX.test(email)) { showMsg('Email address invalide. Vérifie le format (ex: nom@domaine.com).', 'error'); return; }
  if (!pass)  { showMsg('Enter your password.', 'error'); return; }
  if (pass.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  try {
    if (mode === 'signup') {
      const confirm = document.getElementById('passwordConfirmInput').value;
      if (pass !== confirm) { showMsg('Passwords do not match.', 'error'); btn.disabled=false; return; }
      const { data: signupData, error } = await _sb.auth.signUp({ email, password: pass });
      if (error) throw error;
      if (typeof window.fvTrack === 'function') window.fvTrack('Signup', { method: 'email' });
      // Welcome email + persist UTM (best-effort, n'echoue not le signup)
      try {
        const sess = signupData?.session;
        if (sess?.access_token) {
          const headers = { 'Authorization': 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' };
          fetch('/api/email-welcome', { method: 'POST', headers }).catch(() => {});
          const utm = (typeof window.fvGetSignupUtm === 'function') ? window.fvGetSignupUtm() : null;
          if (utm) {
            fetch('/api/profile-utm', { method: 'POST', headers, body: JSON.stringify(utm) }).catch(() => {});
          }
        }
      } catch (_) {}
      showMsg('Account created. Check your inbox to confirm.', 'success');
    } else {
      const { data: signinData, error } = await _sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      if (typeof window.fvTrack === 'function') window.fvTrack('Login', { method: 'email' });
      const uid = signinData?.user?.id || signinData?.session?.user?.id;
      window.location.href = uid ? await getPostLoginDestination(uid) : 'account.html';
    }
  } catch(e) {
    showMsg(translateAuthError(e), 'error');
  } finally {
    btn.disabled = false;
  }
}

// Origine canonique pour les redirections OAuth et magic link.
// Force https://fragvalue.com en prod meme si l'user est sur un deploiement
// preview Vercel. Sans ce fix, window.location.origin = URL de preview
// et Supabase/Google redirige après auth vers une preview inaccessible
// publiquement (or protegee).
// Pour localhost (dev), on garde l'origin local.
function getAuthOrigin() {
  const h = window.location.hostname;
  if (h === 'localhost' || h === '127.0.0.1' || h.startsWith('192.168.')) {
    return window.location.origin;
  }
  return 'https://fragvalue.com';
}

// Traduit les messages d'erreur Supabase/Auth (EN par defaut) en FR user-friendly.
// Fallback sur le message brut si on ne reconnaît not le pattern.
function translateAuthError(err) {
  const msg = String(err?.message || err || '').toLowerCase();
  if (msg.includes('invalid login credentials')) return 'Email or password incorrect.';
  if (msg.includes('user already registered') || msg.includes('already been registered')) return 'This email is already in use. Sign in or use the magic link.';
  if (msg.includes('email rate limit') || msg.includes('rate limit')) return 'Too many attempts. Wait a minute before retrying.';
  if (msg.includes('password should be at least')) return 'Password must be at least 6 characters.';
  if (msg.includes('unable to validate email') || msg.includes('invalid email')) return 'Email address invalide.';
  if (msg.includes('email not confirmed')) return 'Your email is not yet confirmed. Check your inbox.';
  if (msg.includes('user not found')) return 'No account associated with this email.';
  if (msg.includes('network') || msg.includes('fetch')) return 'Connection problem. Check your internet and try again.';
  if (msg.includes('popup') && msg.includes('closed')) return 'Login window closed before completion.';
  if (msg.includes('popup') && msg.includes('blocked')) return 'Your browser blocked the OAuth window. Allow popups for fragvalue.com.';
  // Fallback : retourne le message original si on ne le reconnaît not
  return err?.message || 'An error occurred. Try again.';
}

async function sendMagicLink(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value.trim();
  if (!email) { showMsg('Enter your email address first.', 'error'); return; }
  if (!EMAIL_REGEX.test(email)) { showMsg('Email address invalide.', 'error'); return; }
  try {
    const { error } = await _sb.auth.signInWithOtp({ email, options: { emailRedirectTo: getAuthOrigin() + '/account.html' } });
    if (error) throw error;
    showMsg('Link sent. Check your inbox.', 'success');
  } catch(e) { showMsg(translateAuthError(e), 'error'); }
}

async function loginGoogle() {
  try {
    const { error } = await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: getAuthOrigin() + '/account.html' } });
    if (error) throw error;
  } catch (e) {
    showMsg(translateAuthError(e), 'error');
  }
}


function showMsg(txt, type) {
  const el = document.getElementById('msgBox');
  el.textContent = txt; el.className = 'msg ' + type; el.style.display = 'block';
}
function hideMsg() { document.getElementById('msgBox').style.display = 'none'; }

// FACEIT OAuth flow - factorise dans /faceit-oauth.js (window.fvLoginFaceit)
// pour reutilisation depuis account.html (linking apres signup email/Google).
function loginFaceit() {
  if (typeof window.fvLoginFaceit === 'function') {
    return window.fvLoginFaceit();
  }
  console.error('[login] /faceit-oauth.js not loaded');
}

// Enter key
document.addEventListener('keydown', e => { if(e.key==='Enter') handleSubmit(); });
