<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FragValue — Connexion FACEIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0C0E13;--surface:#131620;--border:#252A38;--accent:#3B7FF5;--text:#EDF0F7;--text2:#8892A4;--success:#2DD4A0;--danger:#F06B6B;--font:'Instrument Sans',sans-serif;--mono:'JetBrains Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;text-align:center;max-width:400px;width:90%}
    .spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
    .title{font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
    .sub{font-size:13px;color:var(--text2);font-family:var(--mono);line-height:1.6}
    .error-msg{font-size:12px;color:var(--danger);font-family:var(--mono);margin-top:12px;padding:10px;background:rgba(240,107,107,.08);border:1px solid rgba(240,107,107,.2);border-radius:6px}
    .success-icon{width:48px;height:48px;background:rgba(45,212,160,.1);border:1px solid rgba(45,212,160,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:20px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Connexion FACEIT...</div>
  <p class="sub" id="sub">Récupération de ton profil</p>
</div>

<script>
  const SUPABASE_URL  = 'https://xmyruycvvkmcwysfygcq.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXJ1eWN2dmttY3d5c2Z5Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQzMzcsImV4cCI6MjA4OTUzMDMzN30.TaPIaI7puA3qnIrkHQ-VL9o9QgegmOjJR8yYVYsi8oI';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  async function handleCallback() {
    // Récupère le code depuis l'URL
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');

    console.log('URL params:', window.location.search);
    console.log('Code:', code);

    if (!code) {
      // Pas encore de code - peut-être que FACEIT redirige via POST
      // On attend un peu et on re-vérifie
      showStatus('En attente de la redirection FACEIT...');
      return;
    }

    const codeVerifier = sessionStorage.getItem('faceit_code_verifier');
    console.log('Code verifier:', codeVerifier ? 'present' : 'missing');

    // Vérifie session Supabase
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = `login.html`;
      return;
    }

    try {
      showStatus('Échange du token...');

      const res = await fetch('/api/faceit-auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          code,
          redirect_uri:  'https://frag-value.vercel.app/faceit-callback.html',
          code_verifier: codeVerifier || '',
        }),
      });

      const data = await res.json();
      console.log('Auth response:', data);

      if (!res.ok || !data.success) {
        showError(data.error || 'Échange de token échoué.');
        return;
      }

      // Sauvegarde dans Supabase
      await sb.from('profiles').update({
        faceit_nickname: data.nickname,
        faceit_id:       data.playerId,
        updated_at:      new Date().toISOString(),
      }).eq('id', session.user.id);

      sessionStorage.removeItem('faceit_code_verifier');

      // Succès
      document.getElementById('card').innerHTML = `
        <div class="success-icon">✓</div>
        <div class="title" style="color:var(--success)">Compte lié !</div>
        <p class="sub">${data.nickname}${data.level ? ' · Level ' + data.level : ''}${data.elo ? ' · ' + data.elo + ' ELO' : ''}</p>
        <p class="sub" style="margin-top:8px;color:var(--text2)">Redirection...</p>`;

      setTimeout(() => {
        window.location.href = `index.html?analyse=${encodeURIComponent(data.nickname)}`;
      }, 1500);

    } catch(err) {
      console.error(err);
      showError('Erreur : ' + err.message);
    }
  }

  function showStatus(msg) {
    document.getElementById('sub').textContent = msg;
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Erreur';
    document.getElementById('sub').textContent   = 'Retour à l\'onboarding dans 3s...';
    const e = document.createElement('div');
    e.className = 'error-msg';
    e.textContent = msg;
    document.getElementById('card').appendChild(e);
    setTimeout(() => { window.location.href = 'onboarding.html'; }, 3000);
  }

  handleCallback();
</script>
</body>
</html>
