<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FragValue — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#08090C;--surface:#0F1117;--card:#161920;--border:#1F2433;--border2:#252B3B;--accent:#3B7FF5;--accent-dim:rgba(59,127,245,.12);--text:#EDF0F7;--text2:#8892A4;--text3:#4A5568;--success:#2DD4A0;--danger:#F06B6B;--font:'Instrument Sans',sans-serif;--mono:'JetBrains Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 0%, rgba(59,127,245,.06), transparent);pointer-events:none;z-index:0}
    nav{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;border-bottom:1px solid var(--border)}
    .logo{font-size:16px;font-weight:700;letter-spacing:-.2px;text-decoration:none;color:var(--text)}
    .logo-accent{color:var(--accent)}
    .nav-back{font-size:13px;color:var(--text2);text-decoration:none;font-weight:500;transition:color .15s}
    .nav-back:hover{color:var(--text)}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;z-index:1}
    .auth-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;animation:fadeUp .3s ease}
    .auth-header{margin-bottom:28px}
    .auth-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
    .auth-sub{font-size:13px;color:var(--text2);line-height:1.6}
    .tabs{display:flex;gap:0;background:var(--card);border-radius:8px;padding:3px;margin-bottom:24px}
    .tab{flex:1;font-size:13px;font-weight:500;padding:8px;text-align:center;cursor:pointer;border-radius:6px;color:var(--text2);transition:all .15s;border:none;background:transparent}
    .tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border)}
    .msg{display:none;padding:11px 14px;border-radius:7px;font-size:12px;font-family:var(--mono);margin-bottom:16px}
    .msg.error{background:rgba(240,107,107,.08);border:1px solid rgba(240,107,107,.2);color:var(--danger)}
    .msg.success{background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);color:var(--success)}
    .social-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:8px;border:1px solid var(--border);background:var(--card);color:var(--text)}
    .social-btn:hover{border-color:var(--border2);background:var(--card2)}
    .social-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
    .g-icon{background:#fff;color:#222}.f-icon{background:#FF5500;color:#fff}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:11px;color:var(--text3);font-family:var(--mono)}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .form-group{margin-bottom:14px}
    .form-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;display:block;font-family:var(--mono)}
    .form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px 14px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
    .form-input::placeholder{color:var(--text3)}
    .form-input:focus{border-color:var(--accent)}
    .submit-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
    .submit-btn:hover{opacity:.9}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .form-footer{font-size:12px;color:var(--text3);text-align:center;margin-top:14px;font-family:var(--mono)}
    .form-footer a{color:var(--accent);text-decoration:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Frag<span class="logo-accent">Value</span></a>
  <a href="index.html" class="nav-back">← Retour</a>
</nav>
<div class="main">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-title" id="authTitle">Connexion</div>
      <p class="auth-sub" id="authSub">Accède à ton espace FragValue.</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('login',this)">Connexion</button>
      <button class="tab" onclick="setTab('register',this)">Inscription</button>
    </div>
    <div id="msgBox" class="msg"></div>
    <button class="social-btn" onclick="loginGoogle()">
      <span class="social-icon g-icon">G</span>Continuer avec Google
    </button>
    <button class="social-btn" onclick="loginFaceit()">
      <span class="social-icon f-icon">F</span>Continuer avec FACEIT
    </button>
    <div class="divider">ou par email</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="emailInput" type="email" placeholder="ton@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="form-group" id="confirmGroup" style="display:none">
      <label class="form-label">Confirmer le mot de passe</label>
      <input class="form-input" id="confirmInput" type="password" placeholder="••••••••"/>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">Se connecter</button>
    <p class="form-footer" id="formLink">
      Pas encore de compte ? <a href="#" onclick="setTab('register',null)">S'inscrire</a>
    </p>
  </div>
</div>
<script>
  const SUPABASE_URL  = 'https://xmyruycvvkmcwysfygcq.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXJ1eWN2dmttY3d5c2Z5Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQzMzcsImV4cCI6MjA4OTUzMDMzN30.TaPIaI7puA3qnIrkHQ-VL9o9QgegmOjJR8yYVYsi8oI';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
  let currentTab = 'login';
  sb.auth.getSession().then(({ data }) => { if (data.session) window.location.href = 'account.html'; });

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    else document.querySelectorAll('.tab')[tab==='login'?0:1].classList.add('active');
    const isLogin = tab === 'login';
    document.getElementById('authTitle').textContent   = isLogin ? 'Connexion' : 'Créer un compte';
    document.getElementById('authSub').textContent     = isLogin ? 'Accède à ton espace FragValue.' : 'Rejoins FragValue — gratuit pour commencer.';
    document.getElementById('submitBtn').textContent   = isLogin ? 'Se connecter' : 'Créer mon compte';
    document.getElementById('confirmGroup').style.display = isLogin ? 'none' : 'block';
    document.getElementById('formLink').innerHTML = isLogin
      ? `Pas encore de compte ? <a href="#" onclick="setTab('register',null)">S'inscrire</a>`
      : `Déjà un compte ? <a href="#" onclick="setTab('login',null)">Se connecter</a>`;
    hideMsg();
  }

  async function loginGoogle() {
    const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:'https://frag-value.vercel.app/onboarding.html' } });
    if (error) showMsg(error.message, 'error');
  }
  async function loginFaceit() { showMsg('Connexion FACEIT — bientôt disponible.', 'error'); }

  async function submitForm() {
    const email = document.getElementById('emailInput').value.trim();
    const pwd   = document.getElementById('passwordInput').value;
    const conf  = document.getElementById('confirmInput').value;
    const btn   = document.getElementById('submitBtn');
    if (!email || !pwd) { showMsg('Remplis tous les champs.', 'error'); return; }
    if (currentTab === 'register' && pwd !== conf) { showMsg('Les mots de passe ne correspondent pas.', 'error'); return; }
    if (pwd.length < 8) { showMsg('Mot de passe trop court (8 caractères min).', 'error'); return; }
    btn.disabled = true; btn.textContent = 'Chargement...';
    try {
      const result = currentTab === 'login'
        ? await sb.auth.signInWithPassword({ email, password:pwd })
        : await sb.auth.signUp({ email, password:pwd, options:{ emailRedirectTo:'https://frag-value.vercel.app/account.html' } });
      if (result.error) showMsg(translateError(result.error.message), 'error');
      else if (currentTab === 'register' && !result.data.session) showMsg('Vérifie ta boîte mail pour confirmer ton compte !', 'success');
      else if (currentTab === 'register') window.location.href = 'onboarding.html';
      else window.location.href = 'account.html';
    } catch { showMsg('Erreur inattendue.', 'error'); }
    finally { btn.disabled=false; btn.textContent=currentTab==='login'?'Se connecter':'Créer mon compte'; }
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key==='Enter') submitForm(); });

  function translateError(msg) {
    if (msg.includes('Invalid login')) return 'Email ou mot de passe incorrect.';
    if (msg.includes('already registered')) return 'Cet email est déjà utilisé.';
    return msg;
  }
  function showMsg(text, type) { const el=document.getElementById('msgBox'); el.textContent=text; el.className=`msg ${type}`; el.style.display='block'; }
  function hideMsg() { document.getElementById('msgBox').style.display='none'; }
</script>
</body>
</html>
