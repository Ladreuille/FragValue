<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FragValue · Mon espace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080909;--surface:#0f1010;--card:#131414;
  --border:#1c1e1e;--border2:#252727;
  --text:#e8eaea;--text2:#7a8080;--text3:#4a5050;
  --accent:#b8ff57;--accent2:#7ddd1a;
  --danger:#ff4444;--success:#2dd4a0;--gold:#f5c842;
  --mono:'Space Mono',monospace;--display:'Anton',sans-serif;
  --r:6px;--r2:12px
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(8,9,9,.88);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.nav-logo{font-family:var(--display);font-size:20px;letter-spacing:.04em;color:var(--text);text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:24px}
.nav-link{font-size:12px;color:var(--text2);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:color .15s;cursor:pointer;border:none;background:none;font-family:var(--mono)}
.nav-link:hover{color:var(--text)}
.nav-cta{background:var(--accent);color:#000;padding:8px 18px;border-radius:var(--r);font-family:var(--mono);font-size:12px;font-weight:700;text-decoration:none;letter-spacing:.06em;transition:all .15s;border:none;cursor:pointer}
.nav-cta:hover{background:var(--accent2)}

/* PAGE */
.page{max-width:1000px;margin:0 auto;padding:48px 32px 100px;position:relative;z-index:1}

/* SECTION LABEL */
.sl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}

/* PROFILE HEADER */
.profile-header{
  display:flex;align-items:center;gap:24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:28px 32px;
  margin-bottom:32px;
  opacity:0;animation:up .4s .05s ease forwards
}
.avatar{
  width:64px;height:64px;border-radius:50%;
  background:var(--card);border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:28px;color:var(--accent);
  flex-shrink:0
}
.profile-info{flex:1}
.profile-email{font-size:11px;color:var(--text3);letter-spacing:.06em;margin-bottom:4px}
.profile-name{font-family:var(--display);font-size:28px;letter-spacing:.02em;line-height:1}
.profile-since{font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:.04em}
.profile-badge{
  font-size:10px;padding:4px 12px;border-radius:40px;
  background:rgba(184,255,87,.1);border:1px solid rgba(184,255,87,.2);
  color:var(--accent);letter-spacing:.08em
}
.logout-btn{
  font-size:11px;padding:8px 16px;border-radius:var(--r);
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);cursor:pointer;transition:all .15s;
  font-family:var(--mono);letter-spacing:.04em;flex-shrink:0
}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* STATS GLOBALES */
.global-stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:32px;
  opacity:0;animation:up .4s .1s ease forwards
}
.gs-cell{background:var(--surface);padding:20px 16px;text-align:center}
.gs-val{font-family:var(--display);font-size:32px;color:var(--accent);line-height:1}
.gs-lbl{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.gs-sub{font-size:10px;color:var(--text2);margin-top:3px}

/* PROGRESSION */
.progression{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:24px;margin-bottom:32px;
  opacity:0;animation:up .4s .15s ease forwards
}
.prog-chart{height:80px;display:flex;align-items:flex-end;gap:4px;margin-top:16px}
.prog-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.prog-bar{
  width:100%;border-radius:3px 3px 0 0;
  background:var(--accent);opacity:.7;
  transition:opacity .15s;cursor:pointer;min-height:4px
}
.prog-bar:hover{opacity:1}
.prog-bar-lbl{font-size:8px;color:var(--text3);letter-spacing:.04em}

/* HISTORIQUE */
.history{opacity:0;animation:up .4s .2s ease forwards}
.demo-row{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:8px;
  transition:all .15s;cursor:pointer
}
.demo-row:hover{border-color:var(--border2);background:rgba(255,255,255,.02)}
.demo-map-badge{
  font-family:var(--display);font-size:11px;
  padding:4px 10px;border-radius:3px;
  background:var(--card);border:1px solid var(--border2);
  color:var(--text2);letter-spacing:.04em;flex-shrink:0;min-width:90px;text-align:center
}
.demo-info{flex:1}
.demo-rounds{font-size:13px;font-weight:700;margin-bottom:2px}
.demo-date{font-size:10px;color:var(--text3);letter-spacing:.04em}
.demo-stats{display:flex;gap:20px;align-items:center}
.demo-stat{text-align:center}
.demo-stat-val{font-family:var(--display);font-size:18px;color:var(--text);line-height:1}
.demo-stat-val.accent{color:var(--accent)}
.demo-stat-lbl{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.demo-arrow{color:var(--text3);flex-shrink:0}

/* EMPTY STATE */
.empty{
  text-align:center;padding:60px 24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2)
}
.empty-icon{font-size:32px;margin-bottom:16px;opacity:.4}
.empty-title{font-family:var(--display);font-size:20px;margin-bottom:8px}
.empty-sub{font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.7}
.empty-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#000;
  padding:12px 24px;border-radius:var(--r);
  font-family:var(--mono);font-size:12px;font-weight:700;
  text-decoration:none;letter-spacing:.04em;transition:all .15s
}
.empty-btn:hover{background:var(--accent2);transform:translateY(-1px)}

/* NEW ANALYSIS BTN */
.new-analysis-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#000;
  padding:10px 20px;border-radius:var(--r);
  font-family:var(--mono);font-size:11px;font-weight:700;
  text-decoration:none;letter-spacing:.04em;transition:all .15s;
  margin-left:auto;flex-shrink:0
}
.new-analysis-btn:hover{background:var(--accent2);transform:translateY(-1px)}

/* SKELETON LOADER */
.skel{
  background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);
  background-size:200% 100%;
  animation:skel 1.2s infinite;
  border-radius:4px
}
@keyframes skel{0%{background-position:200%}100%{background-position:-200%}}

@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Frag<span>Value</span></a>
  <div class="nav-right">
    <a href="demo.html" class="nav-link">Nouvelle démo</a>
    <button class="nav-link logout-btn" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<div class="page">

  <!-- PROFILE -->
  <div class="profile-header" id="profileHeader">
    <div class="avatar" id="avatarEl">?</div>
    <div class="profile-info">
      <div class="profile-email" id="profileEmail">Chargement...</div>
      <div class="profile-name" id="profileName">Mon espace</div>
      <div class="profile-since" id="profileSince"></div>
    </div>
    <div class="profile-badge" id="planBadge">FREE</div>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <!-- STATS GLOBALES -->
  <div class="sl">Stats globales</div>
  <div class="global-stats" id="globalStats">
    <div class="gs-cell"><div class="gs-val" id="statDemos">0</div><div class="gs-lbl">Démos analysées</div></div>
    <div class="gs-cell"><div class="gs-val" id="statRating" style="color:var(--accent)">0.00</div><div class="gs-lbl">FV Rating moyen</div><div class="gs-sub">Toutes démos</div></div>
    <div class="gs-cell"><div class="gs-val" id="statKills">0</div><div class="gs-lbl">Kills totaux</div></div>
    <div class="gs-cell"><div class="gs-val" id="statMaps">0</div><div class="gs-lbl">Maps jouées</div></div>
  </div>

  <!-- PROGRESSION FV RATING -->
  <div class="sl">Progression FV Rating</div>
  <div class="progression" id="progressionSection">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:var(--text2);letter-spacing:.04em">Évolution sur tes dernières démos</div>
      </div>
      <div id="ratingTrend" style="font-family:var(--display);font-size:22px;color:var(--accent)"></div>
    </div>
    <div class="prog-chart" id="progChart">
      <div style="width:100%;display:flex;align-items:center;justify-content:center;height:80px">
        <div style="font-size:11px;color:var(--text3)">Analyse tes premières démos pour voir ta progression</div>
      </div>
    </div>
  </div>

  <!-- HISTORIQUE -->
  <div class="sl">
    Historique des démos
    <a href="demo.html" class="new-analysis-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      Nouvelle analyse
    </a>
  </div>
  <div class="history" id="historySection">
    <!-- rempli par JS -->
  </div>

</div>

<script>
const SUPABASE_URL  = 'https://xmyruycvvkmcwysfygcq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXJ1eWN2dmttY3d5c2Z5Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQzMzcsImV4cCI6MjA4OTUzMDMzN30.TaPIaI7puA3qnIrkHQ-VL9o9QgegmOjJR8yYVYsi8oI';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function init() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const user = session.user;
  const email = user.email || '';
  const initial = email.charAt(0).toUpperCase();
  const name = user.user_metadata?.full_name || user.user_metadata?.name || email.split('@')[0];
  const since = new Date(user.created_at).toLocaleDateString('fr-FR', { month:'long', year:'numeric' });

  document.getElementById('avatarEl').textContent      = initial;
  document.getElementById('profileEmail').textContent  = email;
  document.getElementById('profileName').textContent   = name;
  document.getElementById('profileSince').textContent  = 'Membre depuis ' + since;

  // Charger les démos depuis Supabase
  const { data: demos, error } = await _sb.from('demos')
    .select('*')
    .eq('user_id', user.id)
    .order('analysed_at', { ascending: false })
    .limit(50);

  if (error) { console.warn('Erreur chargement démos:', error.message); }

  const list = demos || [];
  renderStats(list);
  renderProgression(list);
  renderHistory(list);
}

function renderStats(demos) {
  const total = demos.length;
  const maps  = [...new Set(demos.map(d => d.map).filter(Boolean))].length;
  const totalKills = demos.reduce((s, d) => s + (d.total_kills || 0), 0);

  // FV Rating moyen — stocké si disponible, sinon 0
  const ratings = demos.map(d => d.fv_rating).filter(r => r > 0);
  const avgRating = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(2) : '—';

  document.getElementById('statDemos').textContent  = total;
  document.getElementById('statRating').textContent = avgRating;
  document.getElementById('statKills').textContent  = totalKills;
  document.getElementById('statMaps').textContent   = maps;
}

function renderProgression(demos) {
  const chart = document.getElementById('progChart');
  const last10 = demos.slice(0,10).reverse();
  if (last10.length === 0) return;

  const ratings = last10.map(d => d.fv_rating || 1.0);
  const maxR = Math.max(...ratings, 2);
  const minR = Math.min(...ratings, 0.5);

  chart.innerHTML = last10.map((d, i) => {
    const r = d.fv_rating || 1.0;
    const pct = Math.max(5, ((r - minR) / (maxR - minR + 0.001)) * 100);
    const date = new Date(d.analysed_at).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit'});
    return `
      <div class="prog-bar-wrap">
        <div class="prog-bar" style="height:${pct}%;opacity:${0.5 + i/last10.length*0.5}" title="FV Rating: ${r.toFixed(2)} · ${date}"></div>
        <div class="prog-bar-lbl">${date}</div>
      </div>`;
  }).join('');

  // Tendance
  if (ratings.length >= 2) {
    const diff = ratings[ratings.length-1] - ratings[0];
    const trend = diff > 0 ? `+${diff.toFixed(2)} ↑` : `${diff.toFixed(2)} ↓`;
    const color = diff > 0 ? 'var(--success)' : 'var(--danger)';
    document.getElementById('ratingTrend').textContent = trend;
    document.getElementById('ratingTrend').style.color = color;
  }
}

function renderHistory(demos) {
  const el = document.getElementById('historySection');

  if (demos.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--text3);margin:0 auto;display:block">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="empty-title">Aucune démo analysée</div>
        <p class="empty-sub">Upload ta première démo FACEIT pour voir tes stats apparaître ici.</p>
        <a href="demo.html" class="empty-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Analyser une démo
        </a>
      </div>`;
    return;
  }

  el.innerHTML = demos.map(d => {
    const map   = d.map || 'Inconnue';
    const date  = new Date(d.analysed_at).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'});
    const time  = new Date(d.analysed_at).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
    const kills = d.total_kills || '—';
    const rounds= d.rounds || '—';
    const rating= d.fv_rating ? d.fv_rating.toFixed(2) : '—';

    return `
      <div class="demo-row" onclick="window.location.href='demo.html'">
        <div class="demo-map-badge">${map.replace('de_','')}</div>
        <div class="demo-info">
          <div class="demo-rounds">${rounds} rounds</div>
          <div class="demo-date">${date} · ${time}</div>
        </div>
        <div class="demo-stats">
          <div class="demo-stat">
            <div class="demo-stat-val accent">${rating}</div>
            <div class="demo-stat-lbl">FV Rating</div>
          </div>
          <div class="demo-stat">
            <div class="demo-stat-val">${kills}</div>
            <div class="demo-stat-lbl">Kills</div>
          </div>
        </div>
        <svg class="demo-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
  }).join('');
}

async function logout() {
  await _sb.auth.signOut();
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
