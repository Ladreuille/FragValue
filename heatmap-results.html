<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FragValue — Résultats démo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07090D;--surface:#0C1018;--card:#111720;--border:#1C2A3A;--accent:#FF5500;--accent2:#00E5FF;--text:#E8F4FD;--muted:#4A6580;--success:#39FF8A;--danger:#FF4560;--gold:#FFB800;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,85,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,85,0,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(7,9,13,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .logo{font-size:20px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--text)}.logo span{color:var(--accent)}
    .nav-link{font-family:var(--mono);font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s;margin-left:16px}.nav-link:hover{color:var(--text)}
    .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px 80px}
    .section-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:28px 0 12px;border-left:3px solid var(--accent);padding-left:10px}
    .no-data{text-align:center;padding:80px 24px;position:relative;z-index:1}
    .no-data-title{font-size:24px;font-weight:800;margin-bottom:8px}
    .no-data-sub{font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:24px}
    .meta-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .meta-val{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--accent)}.meta-label{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
    .heatmap-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;width:fit-content;flex-wrap:wrap}
    .heatmap-tab{font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:6px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .2s}
    .heatmap-tab.active{background:var(--card);color:var(--text);border:1px solid var(--border)}
    .canvas-wrap{display:grid;grid-template-columns:1fr 210px;gap:16px;align-items:start}
    @media(max-width:700px){.canvas-wrap{grid-template-columns:1fr}}
    .canvas-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
    #heatmapCanvas{width:100%;height:auto;border-radius:6px;display:block}
    .player-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
    .player-panel-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
    .player-btn{width:100%;text-align:left;padding:9px 10px;border-radius:5px;font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid transparent;background:transparent;cursor:pointer;transition:all .2s;margin-bottom:3px;display:block}
    .player-btn:hover{border-color:var(--border);color:var(--text)}.player-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,85,0,.08)}
    .player-kd{float:right;font-size:10px}.export-btn{font-family:var(--mono);font-size:11px;padding:7px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;margin-top:8px;width:100%}.export-btn:hover{border-color:var(--accent);color:var(--accent)}
    .legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--muted)}
    .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
    .stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .stat-value{font-size:26px;font-weight:800;letter-spacing:-1px}.stat-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
    .table-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px;min-width:350px}
    th{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);letter-spacing:.5px}
    td{padding:8px 10px;border-bottom:1px solid rgba(28,42,58,.5);font-family:var(--mono)}
    tr:last-child td{border-bottom:none}.td-name{font-weight:500;color:var(--text)}.td-good{color:var(--success)}.td-warn{color:var(--gold)}.td-bad{color:var(--danger)}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Frag<span>Value</span></a>
  <div>
    <a href="demo.html" class="nav-link">Nouvelle démo</a>
    <a href="index.html" class="nav-link">Scout</a>
  </div>
</nav>

<div class="no-data" id="noData" style="display:none">
  <div class="no-data-title">Aucune démo analysée</div>
  <p class="no-data-sub">Importe d'abord une démo depuis la page d'analyse.</p>
  <a href="demo.html" style="display:inline-block;background:var(--accent);color:#fff;padding:12px 24px;border-radius:6px;font-family:var(--font);font-size:14px;font-weight:700;text-decoration:none">Analyser une démo</a>
</div>

<div class="page" id="mainContent" style="display:none">
  <div class="section-title">Résultats</div>
  <div class="meta-card" id="metaCard"></div>
  <div class="section-title">Stats clés</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="section-title">Heatmaps</div>
  <div class="heatmap-tabs">
    <button class="heatmap-tab active" onclick="switchHeatmap('kills',this)">Kills</button>
    <button class="heatmap-tab" onclick="switchHeatmap('deaths',this)">Deaths</button>
    <button class="heatmap-tab" onclick="switchHeatmap('movement',this)">Déplacements</button>
    <button class="heatmap-tab" onclick="switchHeatmap('duels',this)">Duel zones</button>
    <button class="heatmap-tab" onclick="switchHeatmap('utility',this)">Utility</button>
  </div>
  <div class="canvas-wrap">
    <div class="canvas-card">
      <canvas id="heatmapCanvas" width="600" height="600"></canvas>
      <div class="legend" id="mapLegend"></div>
    </div>
    <div class="player-panel">
      <div class="player-panel-title">Joueur</div>
      <div id="playerList"></div>
      <button class="export-btn" onclick="exportHeatmap()">Exporter PNG</button>
    </div>
  </div>
  <div class="section-title">Classement</div>
  <div class="table-card"><table><thead><tr><th>Joueur</th><th>K</th><th>D</th><th>K/D</th><th>HS%</th></tr></thead><tbody id="playersTable"></tbody></table></div>
</div>

<script>


const MAP_BOUNDS={'de_dust2':{minX:-2476,maxX:1444,minY:-1228,maxY:3346},'de_mirage':{minX:-3230,maxX:870,minY:-2750,maxY:930},'de_inferno':{minX:-2087,maxX:2870,minY:-1200,maxY:3110},'de_nuke':{minX:-3453,maxX:2497,minY:-3000,maxY:2200},'de_ancient':{minX:-2953,maxX:2164,minY:-1600,maxY:3200},'de_anubis':{minX:-2100,maxX:2500,minY:-2000,maxY:2700}};
let demoData=null,currentPlayer=null,currentHeatmap='kills',canvas,ctx;
function w2c(x,y,map,W,H){const b=MAP_BOUNDS[map]||{minX:-3000,maxX:3000,minY:-3000,maxY:3000};return{px:((x-b.minX)/(b.maxX-b.minX))*W,py:(1-(y-b.minY)/(b.maxY-b.minY))*H}}
window.addEventListener('load',()=>{
  canvas=document.getElementById('heatmapCanvas');ctx=canvas.getContext('2d');
  const raw=sessionStorage.getItem('demoData');
  if(!raw){document.getElementById('noData').style.display='block';return;}
  try{
    demoData=JSON.parse(raw);
    document.getElementById('mainContent').style.display='block';
    renderMeta();renderStats();renderPlayerList();
    renderHeatmap();
  }
  catch(e){document.getElementById('noData').style.display='block';}
});
function renderMeta(){const m=demoData.meta;document.getElementById('metaCard').innerHTML=`<div class="meta-item"><div class="meta-val">${m.map||'—'}</div><div class="meta-label">Map</div></div><div class="meta-item"><div class="meta-val">${m.rounds||0}</div><div class="meta-label">Rounds</div></div><div class="meta-item"><div class="meta-val">${m.totalKills||0}</div><div class="meta-label">Kills</div></div><div class="meta-item"><div class="meta-val">${m.players?m.players.length:0}</div><div class="meta-label">Joueurs</div></div>${m.targetPlayer?`<div class="meta-item"><div class="meta-val" style="font-size:16px">${m.targetPlayer}</div><div class="meta-label">Analysé</div></div>`:''}`;}
function renderStats(){const kills=demoData.kills||[];const hs=kills.filter(k=>k.isHeadshot).length;const hsPct=kills.length>0?((hs/kills.length)*100).toFixed(0):0;const walls=kills.filter(k=>k.isWallbang).length;const smokes=kills.filter(k=>k.thruSmoke).length;document.getElementById('statsGrid').innerHTML=[{label:'Kills totaux',value:kills.length,sub:'dans la démo',color:'var(--accent)'},{label:'Headshot %',value:hsPct+'%',sub:hs+' HS',color:'var(--success)'},{label:'Wallbangs',value:walls,sub:'à travers murs',color:'var(--gold)'},{label:'Thru smoke',value:smokes,sub:'kills smoke',color:'var(--accent2)'},{label:'Rounds',value:(demoData.rounds||[]).length,sub:'joués',color:'var(--accent)'},{label:'Grenades',value:(demoData.grenades||[]).length,sub:'lancées',color:'var(--accent2)'}].map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('');}
function renderPlayerList(){const players=demoData.playerStats||[];const list=document.getElementById('playerList');list.innerHTML=`<button class="player-btn active" onclick="selectPlayer(null,this)">Tous<span class="player-kd">—</span></button>`;players.slice(0,10).forEach(p=>{list.innerHTML+=`<button class="player-btn" onclick="selectPlayer('${p.name}',this)">${p.name.substring(0,14)}<span class="player-kd">${p.kd}</span></button>`;});const tbody=document.getElementById('playersTable');tbody.innerHTML=players.map(p=>{const kd=parseFloat(p.kd);const cl=kd>=1.3?'td-good':kd>=1?'td-warn':'td-bad';return`<tr><td class="td-name">${p.name}</td><td>${p.kills}</td><td>${p.deaths}</td><td class="${cl}">${p.kd}</td><td>${p.hsPct}%</td></tr>`;}).join('');}
function selectPlayer(name,btn){currentPlayer=name;document.querySelectorAll('.player-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHeatmap();}
function switchHeatmap(type,btn){currentHeatmap=type;document.querySelectorAll('.heatmap-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHeatmap();}
function renderHeatmap(){if(!demoData)return;const map=demoData.meta?.map||'de_dust2';const W=canvas.width,H=canvas.height;
  // Draw map background if loaded
ctx.clearRect(0,0,W,H);ctx.fillStyle='#080C10';ctx.fillRect(0,0,W,H);
  // Draw map image as background
  // Draw CS2 map background
  if(typeof drawMapBackground === 'function') {
    drawMapBackground(ctx, map, W, H);
  } else {
    ctx.fillStyle='#0A0C10'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#1E2530'; ctx.fillRect(10,10,W-20,H-20);
  }
  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=.5;for(let i=1;i<10;i++){ctx.beginPath();ctx.moveTo(i*W/10,0);ctx.lineTo(i*W/10,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*H/10);ctx.lineTo(W,i*H/10);ctx.stroke();}
if(currentHeatmap==='kills')drawKills(map,W,H,'attacker');else if(currentHeatmap==='deaths')drawKills(map,W,H,'victim');else if(currentHeatmap==='movement')drawMovement(map,W,H);else if(currentHeatmap==='duels')drawDuels(W,H);else if(currentHeatmap==='utility')drawUtility(map,W,H);
ctx.fillStyle='rgba(7,9,13,.7)';ctx.fillRect(8,8,180,24);ctx.fillStyle='#E8F4FD';ctx.font='500 10px DM Mono,monospace';ctx.textAlign='left';const labels={kills:'KILL HEATMAP',deaths:'DEATH HEATMAP',movement:'DÉPLACEMENTS',duels:'DUEL WIN ZONES',utility:'UTILITY MAP'};ctx.fillText(labels[currentHeatmap]||'',14,23);updateLegend();}
function drawKills(map,W,H,mode){let kills=demoData.kills||[];if(currentPlayer)kills=kills.filter(k=>mode==='attacker'?k.attacker===currentPlayer:k.victim===currentPlayer);const gs=24,grid={};let mx=0;kills.forEach(k=>{const x=mode==='attacker'?k.attackerX:k.victimX;const y=mode==='attacker'?k.attackerY:k.victimY;const{px,py}=w2c(x,y,map,W,H);const key=`${Math.floor(px/gs)}_${Math.floor(py/gs)}`;grid[key]=(grid[key]||0)+1;if(grid[key]>mx)mx=grid[key];});Object.entries(grid).forEach(([key,count])=>{const[gx,gy]=key.split('_').map(Number);const t=count/mx;ctx.fillStyle=mode==='attacker'?`rgba(255,${Math.floor(85*(1-t))},0,${.25+t*.6})`:`rgba(255,${Math.floor(69*t)},${Math.floor(96*t)},${.25+t*.6})`;ctx.fillRect(gx*gs,gy*gs,gs,gs);});kills.forEach(k=>{const x=mode==='attacker'?k.attackerX:k.victimX;const y=mode==='attacker'?k.attackerY:k.victimY;const{px,py}=w2c(x,y,map,W,H);ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fillStyle=mode==='attacker'?'rgba(255,85,0,.9)':'rgba(255,69,96,.9)';ctx.fill();});}
function drawMovement(map,W,H){const positions=demoData.positions||{};const pts=currentPlayer?(positions[currentPlayer]||[]):Object.values(positions).flat();const gs=18,grid={};let mx=0;pts.forEach(p=>{const{px,py}=w2c(p.x,p.y,map,W,H);const key=`${Math.floor(px/gs)}_${Math.floor(py/gs)}`;grid[key]=(grid[key]||0)+1;if(grid[key]>mx)mx=grid[key];});Object.entries(grid).forEach(([key,count])=>{const[gx,gy]=key.split('_').map(Number);const t=count/mx;ctx.fillStyle=`rgba(0,229,255,${.08+t*.7})`;ctx.fillRect(gx*gs,gy*gs,gs,gs);});}
function drawDuels(W,H){const zones=demoData.duelZones||[];const GRID=10,cs=W/GRID;zones.forEach(z=>{const total=z.kills+z.deaths;if(total===0)return;const wr=parseFloat(z.winRate);let color=wr>=65?`rgba(57,255,138,${.2+wr/100*.5})`:wr>=45?'rgba(255,184,0,.4)':`rgba(255,69,96,${.2+(100-wr)/100*.5})`;const px=z.col*cs,py=(GRID-1-z.row)*cs;ctx.fillStyle=color;ctx.fillRect(px,py,cs,cs);if(total>=2){ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(cs*.24)}px DM Mono,monospace`;ctx.textAlign='center';ctx.fillText(wr+'%',px+cs/2,py+cs/2+3);ctx.font=`${Math.floor(cs*.16)}px DM Mono,monospace`;ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillText(total+' duels',px+cs/2,py+cs/2+cs*.22);}});}
function drawUtility(map,W,H){let g=demoData.grenades||[];if(currentPlayer)g=g.filter(x=>x.thrower===currentPlayer);const C={'weapon_flashbang':'rgba(255,255,80,.8)','weapon_smokegrenade':'rgba(80,200,255,.8)','weapon_hegrenade':'rgba(255,80,80,.8)','weapon_molotov':'rgba(255,130,0,.8)','weapon_incgrenade':'rgba(255,130,0,.8)'};g.forEach(x=>{const{px,py}=w2c(x.startX,x.startY,map,W,H);ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fillStyle=C[x.type]||'rgba(180,180,180,.6)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();});}
function updateLegend(){const L={kills:[{color:'#FF5500',label:'Kills'},{color:'rgba(255,85,0,.2)',label:'Densité'}],deaths:[{color:'#FF4560',label:'Deaths'}],movement:[{color:'#00E5FF',label:'Zones fréquentées'}],duels:[{color:'#39FF8A',label:'>65% win'},{color:'#FFB800',label:'45-65%'},{color:'#FF4560',label:'<45%'}],utility:[{color:'rgba(255,255,80,.8)',label:'Flash'},{color:'rgba(80,200,255,.8)',label:'Smoke'},{color:'rgba(255,80,80,.8)',label:'HE'},{color:'rgba(255,130,0,.8)',label:'Molotov'}]};const l=L[currentHeatmap]||[];document.getElementById('mapLegend').innerHTML=l.map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}</div>`).join('');}
function exportHeatmap(){const link=document.createElement('a');link.download=`fragvalue-${currentHeatmap}.png`;link.href=canvas.toDataURL('image/png');link.click();}
</script>
<script src="maps.js"></script>
</body>
</html>
