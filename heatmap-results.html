  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0C0E13;--surface:#131620;--card:#191D27;--border:#252A38;--border2:#1E2233;
      --accent:#3B7FF5;--accent-dim:rgba(59,127,245,.12);
      --text:#EDF0F7;--text2:#8892A4;--text3:#4A5568;
      --success:#2DD4A0;--danger:#F06B6B;--gold:#F5C842;
      --font:'Instrument Sans',sans-serif;--mono:'JetBrains Mono',monospace
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;background:rgba(12,14,19,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .logo{font-size:16px;font-weight:700;letter-spacing:-.2px;text-decoration:none;color:var(--text)}
    .logo-accent{color:var(--accent)}
    .nav-link{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;font-weight:500}
    .nav-link:hover{color:var(--text);background:var(--card)}
    .page{max-width:1200px;margin:0 auto;padding:28px 32px 80px}
    .section-label{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--text3);text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:10px}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .no-data{text-align:center;padding:80px 24px}
    .no-data-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
    .no-data-sub{font-size:13px;color:var(--text2);margin-bottom:24px;font-family:var(--mono)}
    .no-data-btn{display:inline-block;background:var(--accent);color:#fff;padding:11px 24px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;text-decoration:none}
    .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
    .meta-item{text-align:center}
    .meta-val{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--accent);font-family:var(--mono);line-height:1}
    .meta-label{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
    .stat-label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin-bottom:7px;font-family:var(--mono)}
    .stat-val{font-size:22px;font-weight:700;letter-spacing:-.8px;font-family:var(--mono);line-height:1}
    .stat-sub{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
    .c-accent{color:var(--accent)}.c-good{color:var(--success)}.c-warn{color:var(--gold)}.c-neutral{color:var(--text)}
    .heatmap-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content;flex-wrap:wrap}
    .heatmap-tab{font-family:var(--mono);font-size:12px;font-weight:500;padding:7px 14px;border-radius:6px;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .15s;display:flex;align-items:center;gap:4px}
    .heatmap-tab.active{background:var(--card);color:var(--text);border:1px solid var(--border)}
    .floor-toggle{display:none;gap:4px;margin-bottom:10px;align-items:center}
    .floor-toggle.visible{display:flex}
    .floor-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;color:var(--text2);border:1px solid var(--border);background:transparent;transition:all .15s}
    .floor-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(59,127,245,.4)}
    .side-toggle{display:flex;gap:6px;margin-bottom:14px;align-items:center}
    .side-toggle-label{font-family:var(--mono);font-size:11px;color:var(--text3);margin-right:4px}
    .side-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 14px;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:5px}
    .side-btn.active-ct{background:rgba(74,158,255,.12);color:#4A9EFF;border-color:rgba(74,158,255,.3)}
    .side-btn.active-t{background:rgba(245,200,66,.1);color:var(--gold);border-color:rgba(245,200,66,.25)}
    .side-check{width:10px;height:10px;border-radius:2px;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
    .side-check::after{content:'';width:5px;height:5px;border-radius:1px;background:currentColor;display:none}
    .side-btn.active-ct .side-check::after,.side-btn.active-t .side-check::after{display:block}
    .side-stats-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .side-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
    .side-stat-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
    .side-dot-ct{width:7px;height:7px;border-radius:50%;background:#4A9EFF;flex-shrink:0}
    .side-dot-t{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
    .side-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .side-stat-item{text-align:center}
    .side-stat-val{font-size:18px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px}
    .side-stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
    /* ── Layout fullscreen replay ─────────────────────────────── */
    .canvas-outer{display:flex;flex-direction:column;gap:0}

    /* Mode normal (heatmaps) */
    .canvas-wrap{display:grid;grid-template-columns:1fr 220px;gap:14px;align-items:start}
    @media(max-width:700px){.canvas-wrap{grid-template-columns:1fr}}
    .canvas-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}.replay-canvas-card{border-radius:10px 10px 0 0!important;border-bottom:none!important}
    #heatmapCanvas{width:100%;height:auto;border-radius:6px;display:block}

    /* Mode replay fullscreen */
    .replay-fullscreen{
      position:fixed;inset:0;z-index:200;
      background:var(--bg);
      display:none;flex-direction:column;
    }
    .replay-fullscreen.active{display:flex}

    /* Header replay */
    .rf-header{
      height:48px;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;
      background:rgba(12,14,19,.95);
      border-bottom:1px solid var(--border);
    }
    .rf-title{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px}
    .rf-map{color:var(--accent)}
    .rf-close{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:11px;transition:all .15s}
    .rf-close:hover{border-color:var(--danger);color:var(--danger)}
    .rf-round-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(59,127,245,.1);color:var(--accent);border:1px solid rgba(59,127,245,.2);padding:4px 10px;border-radius:6px}
    .rf-live-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite}

    /* Zone principale */
    .rf-main{flex:1;display:grid;grid-template-columns:1fr 200px;min-height:0;overflow:hidden}

    /* Canvas */
    .rf-canvas-wrap{position:relative;background:#0A0C12;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #replayCanvas{max-width:100%;max-height:100%;display:block}

    /* Panel droit joueurs */
    .rf-panel{
      background:var(--surface);border-left:1px solid var(--border);
      display:flex;flex-direction:column;overflow-y:auto;
      padding:10px;gap:4px;
    }
    .rf-panel-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .rf-player{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:all .12s;border:1px solid transparent}
    .rf-player:hover{background:rgba(255,255,255,.04)}
    .rf-player.active{background:rgba(59,127,245,.06);border-color:rgba(59,127,245,.15)}
    .rf-player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .rf-player-name{font-family:var(--mono);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rf-player-kd{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
    .rf-player.dead .rf-player-name{opacity:.35;text-decoration:line-through}

    /* Footer replay */
    .rf-footer{
      flex-shrink:0;
      background:rgba(12,14,19,.97);
      border-top:1px solid var(--border);
      padding:10px 16px 12px;
      display:flex;flex-direction:column;gap:8px;
    }

    /* Barre rounds dans le footer */
    .rf-rounds{display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto;align-items:center;padding-bottom:2px}
    .rf-rounds::-webkit-scrollbar{height:3px}
    .rf-rounds::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .rnd2{
      position:relative;min-width:24px;height:28px;border-radius:5px;
      border:1px solid var(--border);background:var(--card);
      color:var(--text3);font-family:var(--mono);font-size:9px;font-weight:700;
      cursor:pointer;transition:all .15s;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;overflow:hidden;
    }
    .rnd2::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
    .rnd2.win::after{background:var(--success)}
    .rnd2.loss::after{background:var(--danger)}
    .rnd2:hover{border-color:rgba(59,127,245,.4);color:var(--text)}
    .rnd2.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,127,245,.4)}
    .rnd2-all{min-width:auto;padding:0 8px;font-size:9px}
    .rnd2-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;margin:0 2px}

    /* Timeline + controls dans footer */
    .rf-controls-row{display:flex;align-items:center;gap:10px}
    .rf-time{font-family:var(--mono);font-size:10px;color:var(--text2);white-space:nowrap;min-width:80px}
    .rf-timeline{flex:1;position:relative;height:5px;background:var(--border);border-radius:3px;cursor:pointer}
    .rf-timeline:hover{background:var(--border2)}
    .rf-tl-fill{height:100%;background:linear-gradient(90deg,#3B7FF5,#60A5FA);border-radius:3px;pointer-events:none}
    .rf-tl-thumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--accent);transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 2px rgba(59,127,245,.2)}
    .rf-kill-mark{position:absolute;top:50%;transform:translate(-50%,-50%);width:3px;height:8px;border-radius:1.5px;background:var(--danger);opacity:.5;pointer-events:none}
    .rf-btns{display:flex;align-items:center;gap:3px}
    .rfb{width:32px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .rfb:hover{border-color:rgba(59,127,245,.5);color:var(--accent)}
    .rfb svg{pointer-events:none;display:block}
    .rfb-play{width:38px;height:38px;border-radius:10px;background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(59,127,245,.35)}
    .rfb-play:hover{opacity:.9}
    .rf-speeds{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:2px;gap:1px}
    .rfs{font-family:var(--mono);font-size:9px;font-weight:600;padding:4px 7px;border-radius:5px;cursor:pointer;color:var(--text3);border:none;background:transparent;transition:all .15s}
    .rfs:hover:not(.on){color:var(--text)}
    .rfs.on{background:var(--accent);color:#fff}
    .rf-kills-chips{display:flex;gap:4px;flex-wrap:wrap;min-height:16px}
    .rfc{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(240,107,107,.08);color:var(--danger);border:1px solid rgba(240,107,107,.14)}
    .rfc.hs{background:rgba(245,200,66,.08);color:var(--gold);border-color:rgba(245,200,66,.14)}
    .map-notice{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px;text-align:center}
    .legend{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--text3)}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .player-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
    .panel-label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
    .panel-hint{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:10px}
    .player-btn{width:100%;text-align:left;padding:7px 10px;border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--text2);border:1px solid transparent;background:transparent;cursor:pointer;transition:all .12s;margin-bottom:3px;display:flex;align-items:center;gap:7px}
    .player-btn:hover{border-color:var(--border);color:var(--text)}
    .player-btn.active{color:var(--text);background:rgba(255,255,255,.05)}
    .player-btn.disabled-max{opacity:.4;cursor:not-allowed}
    .p-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.p-dot.off{opacity:.2}
    .p-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .p-kd{font-size:10px;color:var(--text3);flex-shrink:0}
    .p-star{color:var(--gold);font-size:10px;flex-shrink:0}
    .p-check{font-size:10px;color:var(--success);flex-shrink:0;opacity:0;transition:opacity .12s}
    .player-btn.active .p-check{opacity:1}
    .select-all-btn{width:100%;font-family:var(--mono);font-size:10px;padding:5px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;margin-bottom:8px;transition:all .12s}
    .select-all-btn:hover{color:var(--text);border-color:var(--text3)}
    .export-btn{width:100%;font-family:var(--mono);font-size:11px;padding:7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;margin-top:8px}
    .export-btn:hover{border-color:var(--accent);color:var(--accent)}
    .compare-btn{width:100%;font-family:var(--mono);font-size:11px;padding:7px;border-radius:6px;border:1px solid rgba(45,212,160,.3);background:rgba(45,212,160,.06);color:var(--success);cursor:pointer;transition:all .15s;margin-top:6px}
    .compare-btn:hover{border-color:var(--success);background:rgba(45,212,160,.12)}
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:20px}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:380px}
    th{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card);letter-spacing:.5px;font-weight:500}
    td{padding:9px 14px;border-bottom:1px solid rgba(37,42,56,.5);font-family:var(--mono);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.015)}
    .td-name{color:var(--text);font-weight:500}
    .td-good{color:var(--success)}.td-bad{color:var(--danger)}

    /* ══ REPLAY ══════════════════════════════════════════════════════════════ */
    .replay-system{display:none;flex-direction:column;gap:0;margin-top:14px}
    .replay-system.visible{display:flex}

    /* Barre 1 : Rounds */
    .rounds-nav{background:var(--surface);border:1px solid var(--border);border-radius:10px 10px 0 0;border-bottom:1px solid var(--border2);padding:14px 18px 12px}
    .rounds-nav-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .rounds-nav-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text3)}
    .rounds-nav-legend{display:flex;gap:12px}
    .rnl-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text3)}
    .rnl-pip{width:10px;height:3px;border-radius:2px}
    .rounds-list{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
    .rnd{position:relative;width:26px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text3);font-family:var(--mono);font-size:9px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .rnd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
    .rnd.win::after{background:var(--success)}
    .rnd.loss::after{background:var(--danger)}
    .rnd:hover{border-color:rgba(59,127,245,.4);color:var(--text);transform:translateY(-2px);background:rgba(59,127,245,.06)}
    .rnd.sel{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-2px);box-shadow:0 4px 12px rgba(59,127,245,.35)}
    .rnd.sel::after{background:rgba(255,255,255,.4)}
    .rnd-all{width:auto;padding:0 10px;font-size:9px;letter-spacing:.4px}
    .rnd-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 3px}

    /* Barre 2 : Timeline */
    .round-player{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:14px 18px}
    .rp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .rp-round-tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(59,127,245,.1);color:var(--accent);border:1px solid rgba(59,127,245,.2);padding:5px 12px;border-radius:7px}
    .rp-live-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite}
    .rp-time{font-family:var(--mono);font-size:11px}

    /* ── Tableau équipes étendu ── */
    .ms-cols{display:grid;grid-template-columns:1fr 80px 65px 60px 70px 60px 60px 80px;align-items:center;padding:0 20px;border-bottom:1px solid rgba(37,42,56,.4)}
    .ms-player-row{display:grid;grid-template-columns:1fr 80px 65px 60px 70px 60px 60px 80px;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(37,42,56,.35);transition:background .12s;cursor:pointer}

let currentStatsPlayer=null;

function showPlayerStats(name){
  if(!demoData)return;
  currentStatsPlayer=name;
  const kills=demoData.kills||[];
  const rounds=demoData.rounds||[];
  const color=getColor(name);
  const kd=parseFloat((demoData.playerStats||[]).find(p=>p.name===name)?.kd||0);

  // Stats globales du joueur
  const playerKills=kills.filter(k=>k.attacker===name);
  const playerDeaths=kills.filter(k=>k.victim===name);
  const hs=playerKills.filter(k=>k.isHeadshot).length;
  const hsPct=playerKills.length>0?Math.round(hs/playerKills.length*100):0;
  const wb=playerKills.filter(k=>k.isWallbang).length;
  const smk=playerKills.filter(k=>k.thruSmoke).length;
  const ctKills=playerKills.filter(k=>k.attackerTeam===2).length;
  const tKills=playerKills.filter(k=>k.attackerTeam===3).length;

  // First kills
  const firstKills = (()=>{
    let count=0;
    rounds.forEach((_,i)=>{
      const r=i+1, rk=kills.filter(k=>k.round===r);
      if(!rk.length)return;
      const fk=rk.reduce((a,b)=>a.tick<=b.tick?a:b);
      if(fk.attacker===name)count++;
    });
    return count;
  })();

  // Clutches (1vX) : rounds où le joueur a eu le dernier kill alors que seul côté adversaire
  let clutches=0;
  rounds.forEach((_,i)=>{
    const r=i+1;
    const rKills=kills.filter(k=>k.round===r);
    const myKills=rKills.filter(k=>k.attacker===name);
    if(myKills.length>=2){
      // vérifie si le joueur a fait un kill après que ses teammates soient morts
      const myTeam=playerKills.length>0?(playerKills.filter(k=>k.attackerTeam===2).length>=playerKills.filter(k=>k.attackerTeam===3).length?2:3):2;
      const teamDeaths=rKills.filter(k=>k.victimTeam===myTeam&&k.victim!==name).length;
      if(teamDeaths>=4&&myKills.length>=1)clutches++;
    }
  });

  // Stats par round
  const roundStats={};
  playerKills.forEach(k=>{if(!roundStats[k.round])roundStats[k.round]={k:0,hs:0,d:0};roundStats[k.round].k++;if(k.isHeadshot)roundStats[k.round].hs++;});
  playerDeaths.forEach(k=>{if(!roundStats[k.round])roundStats[k.round]={k:0,hs:0,d:0};roundStats[k.round].d++;});

  const kdCls=kd>=1.3?'psc-kd-good':kd<1?'psc-kd-bad':'psc-kd-neutral';

  const roundRows=rounds.map((rd,i)=>{
    const r=i+1,rs=roundStats[r]||{k:0,hs:0,d:0};
    const won=rd.winner>0;
    return `<div class="psc-round-row">
      <span class="psc-round-num">R${r}</span>
      <span class="psc-round-kills">${rs.k>0?rs.k+'K':'-'}</span>
      <span class="psc-round-hs">${rs.hs>0?rs.hs+' HS':''}</span>
      <span class="psc-round-result ${won?'w':'l'}">${won?'W':'L'}</span>
    </div>`;
  }).join('');

  const pscEl=document.getElementById('playerStatsCard');if(!pscEl)return;
  pscEl.innerHTML=`
    <div class="psc-header">
      <div class="psc-dot" style="background:${color.solid}"></div>
      <div class="psc-name">${name}</div>
      <div class="psc-kd-badge ${kdCls}">K/D ${kd.toFixed(2)}</div>
    </div>
    <div class="psc-grid">
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--accent)">${playerKills.length}</div><div class="psc-stat-lbl">Kills</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--danger)">${playerDeaths.length}</div><div class="psc-stat-lbl">Deaths</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--gold)">${hsPct}%</div><div class="psc-stat-lbl">HS%</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--accent)">${Math.round(playerKills.length*80/(rounds.length||1))}</div><div class="psc-stat-lbl">ADR</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--success)">${firstKills}</div><div class="psc-stat-lbl">First kills</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--gold)">${clutches}</div><div class="psc-stat-lbl">Clutches</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--success)">${ctKills}</div><div class="psc-stat-lbl">Kills CT</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--gold)">${tKills}</div><div class="psc-stat-lbl">Kills T</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--text2)">${wb}</div><div class="psc-stat-lbl">Wallbangs</div></div>
      <div class="psc-stat"><div class="psc-stat-val" style="color:var(--text2)">${smk}</div><div class="psc-stat-lbl">Thru smoke</div></div>
    </div>
    <div class="psc-rounds">
      <div class="psc-rounds-title">Détail par round</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:3px">${roundRows}</div>
    </div>`;

  const psp=document.getElementById('playerStatsPanel');if(psp)psp.style.display='block';
  // Scroll doux vers les stats
  setTimeout(()=>{const _psp=document.getElementById('playerStatsPanel');if(_psp)_psp.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}

// Décompresse les kills au format compact (champs courts) → format long
function expandKills(kills){
  if(!kills||!kills.length)return kills;
  // Détecter si déjà au format long (présence de 'attacker')
  if(kills[0].attacker!==undefined)return kills;
  return kills.map(k=>({
    round:       k.r  ?? 0,
    tick:        k.t  ?? 0,
    attacker:    k.a  || 'Unknown',
    attackerTeam:k.at ?? 0,
    attackerX:   k.ax ?? 0,
    attackerY:   k.ay ?? 0,
    victim:      k.v  || 'Unknown',
    victimTeam:  k.vt ?? 0,
    victimX:     k.vx ?? 0,
    victimY:     k.vy ?? 0,
    weapon:      k.w  || '',
    isHeadshot:  !!k.h,
    thruSmoke:   !!k.s,
    isWallbang:  !!k.wb,
  }));
}

window.addEventListener('load',()=>{
  canvas=document.getElementById('heatmapCanvas');
  if(canvas) ctx=canvas.getContext('2d');
  const raw=sessionStorage.getItem('demoData');
  if(!raw){document.getElementById('noData').style.display='block';return;}
  try{
    demoData=JSON.parse(raw);
    // Décompresser les kills si envoyés en format compact par le parser
    if(demoData.kills) demoData.kills=expandKills(demoData.kills);
    document.getElementById('noData').style.display='none';document.getElementById('mainContent').style.display='block';
    assignPlayerColors();
    const target=demoData.meta?.targetPlayer;
    if(target) activePlayers.add(target);
    renderMeta(); renderMatchStats(); renderPlayerList();
    loadMapImageThenDraw(); initRoundsBar();
  }catch(e){console.error('heatmap-results init error:',e);}
});

function assignPlayerColors(){(demoData.playerStats||[]).forEach((p,i)=>{playerColorMap[p.name]=i%PLAYER_COLORS.length;});}
function getColor(name){const idx=playerColorMap[name];return idx!==undefined?PLAYER_COLORS[idx]:NEUTRAL_COLOR;}
function togglePlayer(name){
  if(activePlayers.has(name)){
    activePlayers.delete(name);
    // Si on désélectionne le joueur affiché dans le panel → cacher le panel
    if(currentStatsPlayer===name){currentStatsPlayer=null;const _p=document.getElementById('playerStatsPanel');if(_p)_p.style.display='none';}
  }else{
    if(activePlayers.size>=5)return;
    activePlayers.add(name);
  }
  renderPlayerList();renderHeatmap();
  // Afficher les stats du joueur cliqué
  if(activePlayers.has(name)){showPlayerStats(name);}
}
function selectNone(){activePlayers.clear();renderPlayerList();renderHeatmap();}
function w2c(wx,wy,map,W,H){
  // Normaliser le nom de map (enlever préfixes workshop, casse, espaces)
  const normMap = (map||'').toLowerCase().replace(/^.*\//, '').trim();
  const cfg=MAP_CONFIG[normMap]||MAP_CONFIG[map];
  if(!cfg)return{px:W/2,py:H/2};
  const c=cfg.upper?(currentFloor==='upper'?cfg.upper:cfg.lower):cfg;
  // Formule Valve : pixel = (world - origin) / scale
  // Image radar = 1024x1024, on normalise vers W×H du canvas
  const rawPx=(wx-c.posX)/c.scale;
  const rawPy=(c.posY-wy)/c.scale;
  return{px:(rawPx/1024)*W, py:(rawPy/1024)*H};
}
function inBounds(px,py,W,H){return px>=0&&px<=W&&py>=0&&py<=H;}

function getMapImgPath(){
  const rawMap=demoData.meta?.map||'de_dust2';
  const normMap=rawMap.toLowerCase().replace(/^.*\//,'').trim();
  const cfg=MAP_CONFIG[normMap]||MAP_CONFIG[rawMap];if(!cfg)return null;if(cfg.upper)return currentFloor==='upper'?cfg.upper.img:cfg.lower.img;return cfg.img||null;}
function loadMapImageThenDraw(){
  const rawMapName=demoData.meta?.map||'de_dust2';
  const mapName=rawMapName.toLowerCase().replace(/^.*\//,'').trim();
  const floorToggleEl=document.getElementById('floorToggle');
  if(floorToggleEl)floorToggleEl.classList.toggle('visible',!!(MAP_CONFIG[mapName]?.upper));
  const imgPath=getMapImgPath();
  const notice=document.getElementById('mapNotice');
  if(!imgPath){mapImage=null;if(notice)notice.textContent=`Radar non disponible pour ${mapName}`;renderHeatmap();return;}
  if(notice)notice.textContent='';
  const img=new Image();
  img.onload=()=>{mapImage=img;canvas.width=img.width;canvas.height=img.height;renderHeatmap();};
  img.onerror=()=>{mapImage=null;notice.textContent=`Image introuvable : ${imgPath}`;renderHeatmap();};
  img.src=imgPath;
}

function renderHeatmap(){
  if(!demoData||currentHeatmap==='replay')return;
  const mapName=demoData.meta?.map||'de_dust2';
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(mapImage){ctx.drawImage(mapImage,0,0,W,H);ctx.fillStyle='rgba(10,12,18,.38)';ctx.fillRect(0,0,W,H);}
  else{ctx.fillStyle='#0A0C12';ctx.fillRect(0,0,W,H);}
  ctx.globalAlpha=1;
  if(activePlayers.size===0){
    ctx.fillStyle='rgba(12,14,19,.85)';ctx.fillRect(W/2-120,H/2-20,240,36);
    ctx.fillStyle='#8892A4';ctx.font='400 11px JetBrains Mono,monospace';ctx.textAlign='center';
    ctx.fillText('Sélectionne des joueurs →',W/2,H/2+4);
  }else{
    if(currentHeatmap==='kills')drawKills(mapName,W,H,'attacker');
    else if(currentHeatmap==='deaths')drawKills(mapName,W,H,'victim');
    else if(currentHeatmap==='movement')drawMovement(mapName,W,H);
    else if(currentHeatmap==='duels')drawDuels(W,H);
    else if(currentHeatmap==='utility')drawUtility(mapName,W,H);
  }
  const lbl={kills:'KILL HEATMAP',deaths:'DEATH HEATMAP',movement:'DÉPLACEMENTS',duels:'DUEL WIN ZONES',utility:'UTILITY MAP'};
  ctx.fillStyle='rgba(12,14,19,.85)';ctx.fillRect(8,8,220,26);
  ctx.fillStyle='#EDF0F7';ctx.font='500 11px JetBrains Mono,monospace';ctx.textAlign='left';
  ctx.fillText(lbl[currentHeatmap]||'',14,25);
  updateLegend();
}

function drawKills(mapName,W,H,mode){
  const kills=demoData.kills||[],gs=Math.floor(W/48);
  const sf=k=>{const t=mode==='attacker'?k.attackerTeam:k.victimTeam;if(t===2)return showCT;if(t===3)return showT;return true;};
  [...activePlayers].forEach(name=>{
    const f=kills.filter(k=>(mode==='attacker'?k.attacker:k.victim)===name&&sf(k));
    drawKillSet(f,getColor(name),mapName,W,H,gs,mode);
  });
}
function drawKillSet(kills,pc,mapName,W,H,gs,mode){
  const valid=kills.filter(k=>{const x=mode==='attacker'?k.attackerX:k.victimX,y=mode==='attacker'?k.attackerY:k.victimY;const{px,py}=w2c(x,y,mapName,W,H);return inBounds(px,py,W,H);});
  const grid={};let mx=0;
  valid.forEach(k=>{const x=mode==='attacker'?k.attackerX:k.victimX,y=mode==='attacker'?k.attackerY:k.victimY;const{px,py}=w2c(x,y,mapName,W,H);const key=`${Math.floor(px/gs)}_${Math.floor(py/gs)}`;grid[key]=(grid[key]||0)+1;if(grid[key]>mx)mx=grid[key];});
  Object.entries(grid).forEach(([key,count])=>{const[gx,gy]=key.split('_').map(Number);ctx.fillStyle=`rgba(${pc.rgb},${.12+(count/mx)*.45})`;ctx.fillRect(gx*gs,gy*gs,gs,gs);});
  valid.forEach(k=>{
    const x=mode==='attacker'?k.attackerX:k.victimX,y=mode==='attacker'?k.attackerY:k.victimY;
    const{px,py}=w2c(x,y,mapName,W,H);
    const isCT=(mode==='attacker'?k.attackerTeam:k.victimTeam)===2;
    ctx.beginPath();ctx.arc(px,py,9,0,Math.PI*2);ctx.fillStyle=`rgba(${pc.rgb},.1)`;ctx.fill();
    ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fillStyle=pc.solid;ctx.fill();
    ctx.strokeStyle=isCT?'#4A9EFF':'#F5C842';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 5px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(isCT?'C':'T',px,py);ctx.textBaseline='alphabetic';
  });
}
function drawMovement(mapName,W,H){
  const positions=demoData.positions||{},gs=Math.floor(W/40);
  [...activePlayers].forEach(name=>{
    const pts=(positions[name]||[]).filter(p=>replayRound===null||p.round===replayRound);
    const color=getColor(name);const grid={};let mx=0;
    pts.forEach(p=>{const{px,py}=w2c(p.x,p.y,mapName,W,H);const key=`${Math.floor(px/gs)}_${Math.floor(py/gs)}`;grid[key]=(grid[key]||0)+1;if(grid[key]>mx)mx=grid[key];});
    Object.entries(grid).forEach(([key,count])=>{const[gx,gy]=key.split('_').map(Number);ctx.fillStyle=`rgba(${color.rgb},${.08+(count/mx)*.6})`;ctx.fillRect(gx*gs,gy*gs,gs,gs);});
  });
}
function drawDuels(W,H){
  const zones=demoData.duelZones||[],GRID=10,cs=W/GRID;
  zones.forEach(z=>{
    const total=z.kills+z.deaths;if(total===0)return;
    const wr=parseFloat(z.winRate);
    const color=wr>=65?`rgba(45,212,160,${.2+wr/100*.45})`:wr>=45?`rgba(245,200,66,.4)`:`rgba(240,107,107,${.2+(100-wr)/100*.45})`;
    const px=z.col*cs,py=(GRID-1-z.row)*cs;
    ctx.fillStyle=color;ctx.fillRect(px,py,cs,cs);
    if(total>=2){ctx.fillStyle='rgba(237,240,247,.9)';ctx.font=`600 ${Math.floor(cs*.24)}px JetBrains Mono,monospace`;ctx.textAlign='center';ctx.fillText(wr+'%',px+cs/2,py+cs/2+3);ctx.font=`${Math.floor(cs*.16)}px JetBrains Mono,monospace`;ctx.fillStyle='rgba(237,240,247,.5)';ctx.fillText(total+' duels',px+cs/2,py+cs/2+cs*.22);}
  });
}
function drawUtility(mapName,W,H){
  const C={'weapon_flashbang':'rgba(245,200,66,.9)','weapon_smokegrenade':'rgba(45,212,160,.8)','weapon_hegrenade':'rgba(240,107,107,.85)','weapon_molotov':'rgba(237,160,32,.85)','weapon_incgrenade':'rgba(237,160,32,.85)'};
  (demoData.grenades||[]).filter(x=>activePlayers.has(x.thrower)).forEach(x=>{
    const{px,py}=w2c(x.startX,x.startY,mapName,W,H);
    const color=C[x.type]||'rgba(138,146,164,.6)';
    ctx.beginPath();ctx.arc(px,py,10,0,Math.PI*2);ctx.fillStyle=color.replace(/[\d.]+\)$/,'0.2)');ctx.fill();
    ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='rgba(237,240,247,.25)';ctx.lineWidth=1;ctx.stroke();
  });
}

function updateLegend(){
  let items=[];
  if(currentHeatmap==='utility')items=[{color:'rgba(245,200,66,.9)',label:'Flash'},{color:'rgba(45,212,160,.8)',label:'Smoke'},{color:'rgba(240,107,107,.85)',label:'HE'},{color:'rgba(237,160,32,.85)',label:'Molotov'}];
  else if(currentHeatmap==='duels')items=[{color:'#2DD4A0',label:'>65%'},{color:'#F5C842',label:'45-65%'},{color:'#F06B6B',label:'<45%'}];
  else{items=[...activePlayers].map(n=>({color:getColor(n).solid,label:n}));if(showCT)items.push({color:'#4A9EFF',label:'CT'});if(showT)items.push({color:'#F5C842',label:'T'});}
  const mlEl=document.getElementById('mapLegend');if(!mlEl)return;
  mlEl.innerHTML=items.map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}</div>`).join('');
}

function calcFvRating(kills, deaths, assists, rounds) {
  if (!rounds || rounds <= 0) return 0;
  const kpr = kills/rounds, dpr = deaths/rounds, apr = assists/rounds;
  const kast = Math.min(0.92, Math.max(0.50, 0.0073*75 + 0.3591*kpr - 0.5329*dpr + 0.2372*(2.13*kpr+0.42*apr-0.41) + 0.0032*70 + 0.1587));
  return parseFloat((0.0073*kast*100 + 0.3591*kpr - 0.5329*dpr + 0.2372*(2.13*kpr+0.42*apr-0.41) + 0.0032*70 + 0.1587).toFixed(2));
}

function calcKAST(name, kills, rounds) {
  // KAST : % de rounds où le joueur a eu un Kill, Assist, Survived ou was Traded
  // Approximation : rounds avec kill ou round survived (pas mort)
  const totalR = rounds.length || 1;
  let kastRounds = 0;
  rounds.forEach((rd, i) => {
    const r = i + 1;
    const hadKill  = kills.some(k => k.round === r && k.attacker === name);
    const wasDead  = kills.some(k => k.round === r && k.victim   === name);
    const survived = !wasDead;
    if (hadKill || survived) kastRounds++;
  });
  return Math.round(kastRounds / totalR * 100);
}

function renderHighlights(kills, playerStats, rounds) {
  const el = document.getElementById('highlightsBlock');
  if (!el) return;
  const totalR = rounds.length || 1;

  // Calculs par joueur
  const stats = playerStats.map(p => {
    const pK = kills.filter(k => k.attacker === p.name);
    const awpK = pK.filter(k => k.weapon && k.weapon.includes('awp')).length;
    // First kill = premier kill du round (tick le plus bas par round)
    let firstKills = 0;
    const roundsWithKill = {};
    pK.forEach(k => {
      if (!roundsWithKill[k.round] || k.tick < roundsWithKill[k.round].tick)
        roundsWithKill[k.round] = k;
    });
    firstKills = Object.values(roundsWithKill).filter(k => {
      const roundKills = kills.filter(x => x.round === k.round);
      const minTick = Math.min(...roundKills.map(x => x.tick));
      return k.tick === minTick;
    }).length;
    const adr = Math.round(pK.length * 80 / totalR);
    const fvr = calcFvRating(p.kills, p.deaths, 0, totalR);
    return { name: p.name, kills: p.kills, adr, awpK, firstKills, fvr };
  });

  const most = (arr, key) => arr.reduce((a, b) => a[key] >= b[key] ? a : b, arr[0] || {});
  const best = [
    { label:'Most kills',
      icon:`<svg viewBox="0 0 20 20" fill="none" stroke="#F06B6B" stroke-width="1.5" width="18" height="18">
        <path d="M10 3a4 4 0 100 8 4 4 0 000-8z"/>
        <path d="M8 9l-4 8h12l-4-8" stroke-linejoin="round"/>
        <line x1="10" y1="11" x2="10" y2="17" stroke-linecap="round"/>
      </svg>`, bg:'rgba(240,107,107,.12)', p: most(stats,'kills'), val: s => s.kills+' kills' },
    { label:'Most damage',
      icon:`<svg viewBox="0 0 20 20" fill="none" stroke="#F5C842" stroke-width="1.5" width="18" height="18">
        <path d="M3 10h3l2-6 4 12 2-6h3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`, bg:'rgba(245,200,66,.12)', p: most(stats,'adr'), val: s => s.adr+' ADR' },
    { label:'Most AWP kills',
      icon:`<svg viewBox="0 0 20 20" fill="none" stroke="#3B7FF5" stroke-width="1.5" width="18" height="18">
        <path d="M2 11h10l2-3 1 3h3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="5" cy="11" r="2" fill="rgba(59,127,245,.3)"/>
        <line x1="14" y1="8" x2="14" y2="5" stroke-linecap="round"/>
      </svg>`, bg:'rgba(59,127,245,.12)', p: most(stats,'awpK'), val: s => s.awpK+' kills' },
    { label:'Most 1st kills',
      icon:`<svg viewBox="0 0 20 20" fill="none" stroke="#2DD4A0" stroke-width="1.5" width="18" height="18">

function renderPerfChart(playerStats, kills, rounds) {
  const el = document.getElementById('perfChart');
  const barsEl = document.getElementById('perfBars');
  if (!el || !barsEl) return;
  const totalR = rounds.length || 1;
  const data = playerStats.map(p => ({
    name: p.name,
    fvr: calcFvRating(p.kills, p.deaths, 0, totalR),
    color: getColor(p.name).solid,
  })).sort((a, b) => b.fvr - a.fvr);
  const maxFvr = Math.max(...data.map(d => d.fvr), 2);
  const REF = 1.0; // ligne de référence "average"
  barsEl.innerHTML = data.map(d => {
    const pct = Math.min(100, (d.fvr / maxFvr) * 100);
    const refPct = Math.min(100, (REF / maxFvr) * 100);
    const cls = d.fvr >= 1.15 ? 'var(--success)' : d.fvr >= 0.9 ? 'var(--gold)' : 'var(--danger)';
    return `<div class="perf-bar-row">
      <div class="perf-bar-name">${d.name}</div>
      <div class="perf-bar-track">
        <div class="perf-bar-fill" style="width:${pct}%;background:${cls}"></div>
        <div class="perf-ref-line" style="left:${refPct}%"></div>
      </div>
      <div class="perf-bar-val" style="color:${cls}">${d.fvr.toFixed(2)}</div>
    </div>`;
  }).join('');
  el.style.display = 'block';
}

function renderMatchStats() {
  if (!demoData) return;
  const kills = demoData.kills || [];
  const allRounds = demoData.rounds || [];
  const players = demoData.playerStats || [];
  const sf = currentSideFilter;
  const totalR = allRounds.length || 1;

  // Rounds par side
  const sideRounds = sf === 'ct' ? allRounds.filter((_,i)=>i<Math.ceil(totalR/2))
                   : sf === 't'  ? allRounds.filter((_,i)=>i>=Math.ceil(totalR/2))
                   : allRounds;
  const numR = sideRounds.length || 1;

  // Filtres kills par side attaquant / victime
  const sideKillsFor    = k => sf==='both'||( sf==='ct'?k.attackerTeam===2:k.attackerTeam===3);
  const sideKillsAgainst= k => sf==='both'||( sf==='ct'?k.victimTeam===2  :k.victimTeam===3);

  // Attribution équipe : score CT vs T par joueur, puis partition stricte 5/5
  const teamScores = players.map(p => {
    const sCT = kills.filter(k=>(k.attacker===p.name&&k.attackerTeam===2)||(k.victim===p.name&&k.victimTeam===2)).length;
    const sT  = kills.filter(k=>(k.attacker===p.name&&k.attackerTeam===3)||(k.victim===p.name&&k.victimTeam===3)).length;
    return { name: p.name, ctScore: sCT, tScore: sT, diff: sCT - sT };
  }).sort((a,b) => b.diff - a.diff); // plus CT en premier
  const half = Math.ceil(teamScores.length / 2);
  const ctSet = new Set(teamScores.slice(0, half).map(p => p.name));
  const getPlayerTeam = name => ctSet.has(name) ? 2 : 3;

  // First kill par round (approximation : kill avec tick minimum du round)
  const firstKillMap = {};
  allRounds.forEach((_,i) => {
    const r = i+1;
    const rk = kills.filter(k=>k.round===r);
    if (rk.length) {
      const fk = rk.reduce((a,b) => a.tick<=b.tick ? a : b);
      firstKillMap[r] = fk.attacker;
    }
  });

  const teamPlayers = {2: [], 3: []};
  players.forEach(p => {
    const team = getPlayerTeam(p.name);
    const sKills  = kills.filter(k => k.attacker===p.name && sideKillsFor(k));
    const sDeaths = kills.filter(k => k.victim===p.name   && sideKillsAgainst(k));
    const hsCount = sKills.filter(k => k.isHeadshot).length;
    const hsPct   = sKills.length > 0 ? Math.round(hsCount/sKills.length*100) : 0;
    const adr     = Math.round(sKills.length * 80 / numR);
    const kast    = calcKAST(p.name, kills, sideRounds);
    const fvr     = calcFvRating(sKills.length, sDeaths.length, 0, numR);
    const kd      = `${sKills.length}-${sDeaths.length}`;
    const kdNum   = sDeaths.length > 0 ? sKills.length/sDeaths.length : sKills.length;

    // Opening K-D : premier duel de chaque round (kill avec tick minimum du round)
    let opK = 0, opD = 0;
    sideRounds.forEach((_, i) => {
      const r = i + 1;
      const rk = kills.filter(k => k.round === r);
      if (!rk.length) return;
      const fk = rk.reduce((a, b) => (a.tick||0) <= (b.tick||0) ? a : b);
      if (fk.attacker === p.name) opK++;
      else if (fk.victim === p.name) opD++;
    });
    const opKdNum = opD > 0 ? opK / opD : opK;
    const duelPct = (opK + opD) > 0 ? Math.round(opK / (opK + opD) * 100) : 0;

    // Multi-kills : rounds avec 2+ kills
    const mks = sideRounds.reduce((acc, _, i) => {
      const r = i + 1;
      return acc + (sKills.filter(k => k.round === r).length >= 2 ? 1 : 0);
    }, 0);

    teamPlayers[team].push({ name:p.name, kd, kdNum, kills:sKills.length, deaths:sDeaths.length, hsCount, hsPct, adr, kast, fvr, opK, opD, opKdNum, duelPct, mks });
  });

  // CS2 demoparser2 : winner=2 = CT, winner=3 = T
  // Mais certaines démos retournent winner=1 (CT) ou winner=2 (T)
  // On détecte automatiquement le format
  const winnerVals = [...new Set(allRounds.map(r=>r.winner).filter(w=>w>0))];
  const useAlt = winnerVals.length > 0 && !winnerVals.includes(2) && !winnerVals.includes(3);
  const ctWins = allRounds.filter(r => useAlt ? r.winner===1 : r.winner===2).length;
  const tWins  = allRounds.filter(r => useAlt ? r.winner===2 : r.winner===3).length;
  console.log('[FragValue] Rounds winner vals:', winnerVals, '| CT wins:', ctWins, '| T wins:', tWins);

  function teamBlock(teamNum, label, color, score) {
    const tPlayers = (teamPlayers[teamNum]||[]).sort((a,b)=>b.fvr-a.fvr);
    const rows = tPlayers.map(p => {
      const fvrCls = p.fvr>=1.15?'good':p.fvr>=0.9?'avg':'bad';
      const kdCls  = p.kdNum>=1.3?'good':p.kdNum<1?'bad':'';
      const c = getColor(p.name).solid;
      return `<div class="ms-player-row" onclick="showPlayerStats('${p.name.replace(/'/g,"\'")}')">
        <div class="ms-player-name">
          <span class="ms-player-dot" style="background:${c}"></span>
          ${p.name}
        </div>
        <div class="ms-val ${kdCls}">${p.kd}</div>
        <div class="ms-val">${p.kast}%</div>
        <div class="ms-val">${p.adr}</div>
        <div class="ms-val ${p.opKdNum>=1?'good':p.opKdNum<1&&p.opK+p.opD>0?'bad':''}">${p.opK}-${p.opD}</div>
        <div class="ms-val ${p.duelPct>=55?'good':p.duelPct<=44&&p.opK+p.opD>0?'bad':''}">${p.opK+p.opD>0?p.duelPct+'%':'-'}</div>
        <div class="ms-val">${p.mks>0?p.mks:'-'}</div>
        <div class="ms-val rating ${fvrCls}">${p.fvr.toFixed(2)}</div>
      </div>`;
    }).join('');
    const avgFvr = tPlayers.length > 0
      ? (tPlayers.reduce((s,p)=>s+p.fvr,0)/tPlayers.length).toFixed(2)
      : '-';
    return `<div class="ms-team-block">
      <div class="ms-team-header">
        <div class="ms-team-dot" style="background:${color}"></div>
        <div class="ms-team-name">${label}</div>
        <div class="ms-team-score" style="color:${color}" title="FV Rating moyen">⌀ ${avgFvr}</div>
      </div>
      <div class="ms-cols ms-cols-header">
        <div class="ms-col ms-col-name">Joueur</div>
        <div class="ms-col">K-D</div>
        <div class="ms-col">KAST</div>
        <div class="ms-col">ADR</div>
        <div class="ms-col" title="Opening K-D (premier duel du round)">Op. K-D</div>
        <div class="ms-col" title="% duels gagnés (1v1 directs)">Duel%</div>
        <div class="ms-col" title="Multi-kills (rounds avec 2+ kills)">MKs</div>
        <div class="ms-col" style="color:var(--success)">FV Rating</div>
      </div>
      ${rows}
    </div>`;
  }

  // Noms d'équipe : meilleur joueur par FV Rating
  const ctBest = (teamPlayers[2]||[]).sort((a,b)=>b.fvr-a.fvr)[0]?.name || 'CT';
  const tBest  = (teamPlayers[3]||[]).sort((a,b)=>b.fvr-a.fvr)[0]?.name || 'T';
  const ctNames = 'Equipe_' + ctBest;
  const tNames  = 'Equipe_' + tBest;
  // Notification équipe gagnante
  const winner = ctWins > tWins ? {name: ctNames, color: '#4A9EFF', wins: ctWins}
               : tWins > ctWins ? {name: tNames,  color: '#F5C842', wins: tWins}
               : null;
  const winnerBanner = winner
    ? `<div style="display:flex;align-items:center;gap:10px;background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);border-radius:10px;padding:12px 20px;margin-bottom:12px">
        <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="var(--success)" stroke-width="1.5"><path d="M10 2l1.8 4.9H17l-4.1 3 1.6 4.9L10 12l-4.5 2.8 1.6-4.9L3 7h5.2z" stroke-linejoin="round"/></svg>
        <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--success)">VICTOIRE</span>
        <span style="font-size:14px;font-weight:700;color:${winner.color}">${winner.name}</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto">${ctWins} — ${tWins}</span>
      </div>`
    : `<div style="display:flex;align-items:center;gap:10px;background:rgba(59,127,245,.08);border:1px solid rgba(59,127,245,.2);border-radius:10px;padding:12px 20px;margin-bottom:12px">
        <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent)">ÉGALITÉ</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto">${ctWins} — ${tWins}</span>
      </div>`;
  const el = document.getElementById('matchStatsBlock');
  if (el) el.innerHTML = winnerBanner + teamBlock(2, ctNames, '#4A9EFF', ctWins) + teamBlock(3, tNames, '#F5C842', tWins);

  // Highlights + graphique (une seule fois, pas sensible au side)
  if (sf === 'both') {
    renderHighlights(kills, players, allRounds);
    renderPerfChart(players, kills, allRounds);
  }
}

function buildReplayFrames(round){
  const positions=demoData.positions||{},kills=demoData.kills||[];
  const roundKills=kills.filter(k=>k.round===round);
  const roundPos={};
  // Tick de début réel du round (fin du freeze time)
  const freezeEndTick = (demoData.roundStartTicks && demoData.roundStartTicks[round]) || 0;

  Object.entries(positions).forEach(([name,pts])=>{
    // Garder les positions du round, filtrer le freeze côté frontend
    const rpts = pts.filter(p => {
      if(p.round !== round) return false;
      // Si on a le tick de fin de freeze, ignorer les positions avant
      if(freezeEndTick > 0 && p.tick < freezeEndTick) return false;
      return true;
    });
    if(rpts.length > 0) roundPos[name] = rpts;
  });
  if(Object.keys(roundPos).length===0&&roundKills.length===0){replayFrames=[];return;}
  let allTicks=[];
  Object.values(roundPos).forEach(pts=>pts.forEach(p=>allTicks.push(p.tick||0)));
  roundKills.forEach(k=>allTicks.push(k.tick||0));

  // Utiliser roundStartTicks si disponible (après freeze time)
  const freezeStartTick = (demoData.roundStartTicks && demoData.roundStartTicks[round]) || 0;
  const rawMin = Math.min(...allTicks, 0);
  // Si on a le tick de fin de freeze, démarrer là
  const minTick = freezeStartTick > 0 ? freezeStartTick : rawMin;
  const maxTick = Math.max(...allTicks, minTick+1);
  const span = Math.max(maxTick - minTick, 1);
  // span = différence de ticks, tickrate CS2 = 128/sec
  // On veut ~15 frames/sec × durée réelle du round (max 600 frames ~40sec)
  const durationSec = span / 128;
  const N = Math.min(600, Math.max(80, Math.round(durationSec * 15)));
  replayFrames=[];
  for(let f=0;f<=N;f++){
    const progress=f/N,tick=minTick+progress*span;
    const frame={progress,tick,players:{},deaths:[]};
    Object.entries(roundPos).forEach(([name,pts])=>{
      if(!pts.length)return;
      let prev=pts[0],next=pts[pts.length-1];
      for(let i=0;i<pts.length-1;i++){if((pts[i].tick||0)<=tick&&(pts[i+1].tick||0)>=tick){prev=pts[i];next=pts[i+1];break;}}
      const s=Math.max((next.tick||0)-(prev.tick||0),1),t=Math.min(1,Math.max(0,(tick-(prev.tick||0))/s));
      frame.players[name]={x:prev.x+(next.x-prev.x)*t,y:prev.y+(next.y-prev.y)*t,z:prev.z+(next.z-prev.z)*t,team:prev.team,alive:true};
    });
    roundKills.forEach(k=>{if((k.tick||0)<=tick){if(frame.players[k.victim])frame.players[k.victim].alive=false;frame.deaths.push({name:k.victim,x:k.victimX,y:k.victimY});}});
    replayFrames.push(frame);
  }
  const secs=Math.round(span/64);
  const el=document.getElementById('replayTimeTotal');
  if(el)el.textContent=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
  const killsRow=document.getElementById('replayKillsRow');
  if(killsRow)killsRow.innerHTML=roundKills.slice(0,8).map(k=>`<div class="rp-kill ${k.isHeadshot?'hs':''}">${k.attacker} → ${k.victim}${k.isHeadshot?' 💥':''}</div>`).join('');
  const markers=document.getElementById('replayKillMarkers');
  if(markers)markers.innerHTML=roundKills.map(k=>{const pct=Math.min(100,Math.max(0,((k.tick||0)-minTick)/span*100));return `<div class="rp-kill-mark" style="left:${pct}%"></div>`;}).join('');
}

function drawReplayFrame(idx){
  if(!replayFrames.length||!demoData)return;
  const frame=replayFrames[Math.min(idx,replayFrames.length-1)];
  const mapName=(demoData.meta?.map||'de_dust2').toLowerCase();
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(mapImage){ctx.drawImage(mapImage,0,0,W,H);ctx.fillStyle='rgba(10,12,18,.4)';ctx.fillRect(0,0,W,H);}
  else{ctx.fillStyle='#0A0C12';ctx.fillRect(0,0,W,H);}
  ctx.fillStyle='rgba(12,14,19,.85)';ctx.fillRect(8,8,180,26);
  ctx.fillStyle='#EDF0F7';ctx.font='500 11px JetBrains Mono,monospace';ctx.textAlign='left';
  ctx.fillText(`REPLAY — Round ${replayRound}`,14,25);
  frame.deaths.forEach(d=>{
    const{px,py}=w2c(d.x,d.y,mapName,W,H);if(!inBounds(px,py,W,H))return;
    ctx.strokeStyle='rgba(240,107,107,.7)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px-5,py-5);ctx.lineTo(px+5,py+5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+5,py-5);ctx.lineTo(px-5,py+5);ctx.stroke();
  });
  Object.entries(frame.players).forEach(([name,p])=>{
    if(!p.alive)return;
    const{px,py}=w2c(p.x,p.y,mapName,W,H);if(!inBounds(px,py,W,H))return;
    const color=getColor(name),isCT=p.team===3;
    ctx.beginPath();ctx.arc(px,py,11,0,Math.PI*2);ctx.fillStyle=`rgba(${color.rgb},.15)`;ctx.fill();
    ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fillStyle=color.solid;ctx.fill();
    ctx.strokeStyle=isCT?'#4A9EFF':'#F5C842';ctx.lineWidth=2.5;ctx.stroke();
    ctx.fillStyle='#EDF0F7';ctx.font='bold 9px JetBrains Mono,monospace';ctx.textAlign='center';
    ctx.fillText(name.slice(0,8),px,py-11);
  });
  const pct=replayFrames.length>1?(idx/(replayFrames.length-1))*100:0;
  const fillEl=document.getElementById('replayFill'),thumbEl=document.getElementById('replayThumb');
  if(fillEl)fillEl.style.width=pct+'%';if(thumbEl)thumbEl.style.left=pct+'%';
  const minTick=replayFrames[0]?.tick||0;
  const secs=Math.round((frame.tick-minTick)/64);
  const curEl=document.getElementById('replayTimeCurrent');
  if(curEl)curEl.textContent=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
}

function setPlayPause(playing){
  const pi=document.getElementById('playIcon'),pa=document.getElementById('pauseIcon');
  if(pi)pi.style.display=playing?'none':'block';
  if(pa)pa.style.display=playing?'block':'none';
}
function toggleReplay(){
  if(!replayFrames.length)return;
  replayPlaying=!replayPlaying;setPlayPause(replayPlaying);
  if(replayPlaying){
    if(replayFrameIdx>=replayFrames.length-1)replayFrameIdx=0;
    replayTimer=setInterval(()=>{
      replayFrameIdx++;
      if(replayFrameIdx>=replayFrames.length){replayFrameIdx=replayFrames.length-1;clearInterval(replayTimer);replayPlaying=false;setPlayPause(false);}
      else drawReplayFrame(replayFrameIdx);
    },Math.round(1000/FPS/replaySpeed));
  }else clearInterval(replayTimer);
}
function setSpeed(s,btn){replaySpeed=s;document.querySelectorAll('.rps').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(replayPlaying){clearInterval(replayTimer);replayPlaying=false;toggleReplay();}}
function replaySkipBack(){clearInterval(replayTimer);replayPlaying=false;setPlayPause(false);replayFrameIdx=0;drawReplayFrame(0);}
function replaySkipFwd(){clearInterval(replayTimer);replayPlaying=false;setPlayPause(false);replayFrameIdx=replayFrames.length-1;drawReplayFrame(replayFrameIdx);}
function replayStepBack(){clearInterval(replayTimer);replayPlaying=false;setPlayPause(false);replayFrameIdx=Math.max(0,replayFrameIdx-5);drawReplayFrame(replayFrameIdx);}
function replayStepFwd(){clearInterval(replayTimer);replayPlaying=false;setPlayPause(false);replayFrameIdx=Math.min(replayFrames.length-1,replayFrameIdx+5);drawReplayFrame(replayFrameIdx);}
function seekReplay(e){const rect=document.getElementById('replayTimeline').getBoundingClientRect();const pct=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width));replayFrameIdx=Math.round(pct*(replayFrames.length-1));drawReplayFrame(replayFrameIdx);}

// ══ REPLAY FULLSCREEN ════════════════════════════════════════════════════════
let rfCanvas, rfCtx, rfMapImg=null, rfRound=null, rfFrames=[], rfIdx=0;
let rfPlaying=false, rfTimer=null, rfSpeed=1, rfMapName='de_dust2';
const RF_FPS=24;

function openReplayFS(){
  if(!demoData)return;
  rfMapName=(demoData.meta?.map||'de_dust2').toLowerCase().replace(/^.*\//,'').trim();
  document.getElementById('rfMapName').textContent=rfMapName;
  document.getElementById('replayFullscreen').classList.add('active');

  rfCanvas=document.getElementById('replayCanvas');
  rfCtx=rfCanvas.getContext('2d');

  // Charger l'image de carte
  const cfg=MAP_CONFIG[rfMapName];
  if(cfg){
    const img=new Image();
    img.onload=()=>{
      rfMapImg=img;
      rfCanvas.width=img.width; rfCanvas.height=img.height;
      initRfRoundsBar();
      rfSelectRound(1,document.getElementById('rfRoundBtn1'));
    };
    img.onerror=()=>{ rfMapImg=null; initRfRoundsBar(); rfSelectRound(1,document.getElementById('rfRoundBtn1')); };
    img.src=cfg.upper?cfg.upper.img:cfg.img;
  } else {
    rfCanvas.width=1024; rfCanvas.height=1024;
    initRfRoundsBar();
    rfSelectRound(1,document.getElementById('rfRoundBtn1'));
  }
  initRfPlayerList();
}

function closeReplayFS(){
  document.getElementById('replayFullscreen').classList.remove('active');
  clearInterval(rfTimer); rfPlaying=false; rfSetPlayPause(false);
}

function initRfRoundsBar(){
  const rounds=demoData.rounds||[], kills=demoData.kills||[];
  const target=demoData.meta?.targetPlayer;
  const bar=document.getElementById('rfRoundsBar');
  let html='';
  rounds.forEach((rd,i)=>{
    const r=i+1;
    const rK=kills.filter(k=>k.round===r&&k.attacker===target).length;
    if(r===16)html+=`<div class="rnd2-sep"></div>`;
    const rdWon = rd.winner===2||rd.winner===3||rd.winner===1;
    html+=`<button class="rnd2 ${rdWon?'win':'loss'}" id="rfRoundBtn${r}" onclick="rfSelectRound(${r},this)" title="R${r}·${rK}K">${r}</button>`;
  });
  bar.innerHTML=html;
}

function initRfPlayerList(){
  const players=demoData.playerStats||[];
  document.getElementById('rfPlayerList').innerHTML=players.map(p=>{
    const c=getColor(p.name);
    return `<div class="rf-player active" id="rfp-${p.name.replace(/\s/g,'_')}" onclick="rfTogglePlayer('${p.name.replace(/'/g,"\'")}',this)">
      <div class="rf-player-dot" style="background:${c.solid}"></div>
      <div class="rf-player-name">${p.name.slice(0,14)}</div>
      <div class="rf-player-kd">${p.kd}</div>
    </div>`;
  }).join('');
}

let rfHiddenPlayers=new Set();
function rfTogglePlayer(name,el){
  if(rfHiddenPlayers.has(name)){rfHiddenPlayers.delete(name);el.classList.add('active');}
  else{rfHiddenPlayers.add(name);el.classList.remove('active');}
}

function rfSelectRound(round,btn){
  rfRound=round;
  clearInterval(rfTimer); rfPlaying=false; rfSetPlayPause(false);
  document.querySelectorAll('.rnd2').forEach(b=>b.classList.remove('sel'));
  if(btn)btn.classList.add('sel');
  document.getElementById('rfRoundLabel').textContent=`Round ${round}`;
  rfBuildFrames(round);
  rfIdx=0; rfDrawFrame(0);
}

function rfBuildFrames(round){
  const positions=demoData.positions||{}, kills=demoData.kills||[];
  const roundKills=kills.filter(k=>k.round===round);
  const roundStartTicks=demoData.roundStartTicks||{};
  const freezeEnd=roundStartTicks[round]||0;

  // Tick de fin de round depuis demoData.rounds (endTick)
  const roundData=demoData.rounds?.[round-1]||{};
  const roundEndTick=roundData.endTick||0;

  const roundPos={};
  Object.entries(positions).forEach(([name,pts])=>{
    // Garder positions du round, à partir du freeze end
    const rpts=pts.filter(p=>{
      if(p.round!==round)return false;
      if(freezeEnd>0&&p.tick<freezeEnd)return false;
      return true;
    });
    if(rpts.length>0)roundPos[name]=rpts;
  });

  if(!Object.keys(roundPos).length&&!roundKills.length){rfFrames=[];return;}

  // minT = freeze end (début réel du round), maxT = endTick ou dernier tick connu
  let allTicks=[];
  Object.values(roundPos).forEach(pts=>pts.forEach(p=>allTicks.push(p.tick||0)));
  roundKills.forEach(k=>allTicks.push(k.tick||0));
  if(!allTicks.length){rfFrames=[];return;}

  const minT = freezeEnd>0 ? freezeEnd : Math.min(...allTicks);
  const maxT = roundEndTick>minT ? roundEndTick : Math.max(...allTicks);
  const span = Math.max(maxT-minT,1);
  // CS2 tickrate = 64 (matchmaking) ou 128 (FACEIT) — on auto-détecte via densité
  const tickRate = span > 0 && allTicks.length > 20 ? 128 : 64;
  const durSec = span/tickRate;
  // 15 fps × durée réelle, min 80 frames, max 900 (~60s à 15fps)
  const N = Math.min(900, Math.max(80, Math.round(durSec*RF_FPS)));

  rfFrames=[];
  for(let f=0;f<=N;f++){
    const progress=f/N, tick=minT+progress*span;
    const frame={tick,players:{},deaths:[]};
    Object.entries(roundPos).forEach(([name,pts])=>{
      if(!pts.length)return;
      let prev=pts[0],next=pts[pts.length-1];
      for(let i=0;i<pts.length-1;i++){
        if((pts[i].tick||0)<=tick&&(pts[i+1].tick||0)>=tick){prev=pts[i];next=pts[i+1];break;}
      }
      const s=Math.max((next.tick||0)-(prev.tick||0),1);
      const t=Math.min(1,Math.max(0,(tick-(prev.tick||0))/s));
      frame.players[name]={x:prev.x+(next.x-prev.x)*t,y:prev.y+(next.y-prev.y)*t,team:prev.team,alive:true};
    });
    roundKills.forEach(k=>{
      if((k.tick||0)<=tick){
        if(frame.players[k.victim])frame.players[k.victim].alive=false;
        frame.deaths.push({x:k.victimX,y:k.victimY});
      }
    });
    rfFrames.push(frame);
  }

  // Timer
  const tot=Math.round(span/128);
  document.getElementById('rfTimeTot').textContent=`${Math.floor(tot/60)}:${String(tot%60).padStart(2,'0')}`;

  // Kill chips
  document.getElementById('rfKillChips').innerHTML=roundKills.slice(0,8).map(k=>
    `<div class="rfc ${k.isHeadshot?'hs':''}">${k.attacker}→${k.victim}${k.isHeadshot?' 💥':''}</div>`
  ).join('');

  // Kill markers
  document.getElementById('rfKillMarks').innerHTML=roundKills.map(k=>{
    const pct=Math.min(100,Math.max(0,((k.tick||0)-minT)/span*100));
    return `<div class="rf-kill-mark" style="left:${pct}%"></div>`;
  }).join('');
}

function rfDrawFrame(idx){
  if(!rfFrames.length||!rfCtx)return;
  const frame=rfFrames[Math.min(idx,rfFrames.length-1)];
  const W=rfCanvas.width, H=rfCanvas.height;
  rfCtx.clearRect(0,0,W,H);
  if(rfMapImg){rfCtx.drawImage(rfMapImg,0,0,W,H);rfCtx.fillStyle='rgba(10,12,18,.35)';rfCtx.fillRect(0,0,W,H);}
  else{rfCtx.fillStyle='#0A0C12';rfCtx.fillRect(0,0,W,H);}

  // Croix morts
  frame.deaths.forEach(d=>{
    const{px,py}=w2c(d.x,d.y,rfMapName,W,H);
    if(!inBounds(px,py,W,H))return;
    rfCtx.strokeStyle='rgba(240,107,107,.8)';rfCtx.lineWidth=2;
    rfCtx.beginPath();rfCtx.moveTo(px-5,py-5);rfCtx.lineTo(px+5,py+5);rfCtx.stroke();
    rfCtx.beginPath();rfCtx.moveTo(px+5,py-5);rfCtx.lineTo(px-5,py+5);rfCtx.stroke();
  });

  // Joueurs
  Object.entries(frame.players).forEach(([name,p])=>{
    if(!p.alive)return;
    if(rfHiddenPlayers.has(name))return;
    const{px,py}=w2c(p.x,p.y,rfMapName,W,H);
    if(!inBounds(px,py,W,H))return;
    const color=getColor(name), isCT=p.team===3;
    rfCtx.beginPath();rfCtx.arc(px,py,12,0,Math.PI*2);rfCtx.fillStyle=`rgba(${color.rgb},.12)`;rfCtx.fill();
    rfCtx.beginPath();rfCtx.arc(px,py,6,0,Math.PI*2);rfCtx.fillStyle=color.solid;rfCtx.fill();
    rfCtx.strokeStyle=isCT?'#4A9EFF':'#F5C842';rfCtx.lineWidth=2.5;rfCtx.stroke();
    rfCtx.fillStyle='#fff';rfCtx.font='bold 9px JetBrains Mono,monospace';rfCtx.textAlign='center';
    rfCtx.fillText(name.slice(0,8),px,py-11);
  });

  // Timeline
  const pct=rfFrames.length>1?(idx/(rfFrames.length-1))*100:0;
  document.getElementById('rfFill').style.width=pct+'%';
  document.getElementById('rfThumb').style.left=pct+'%';
  const secs=Math.round((frame.tick-(rfFrames[0]?.tick||0))/128);
  document.getElementById('rfTimeCur').textContent=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;

  // Marquer morts dans panel joueurs
  Object.entries(frame.players).forEach(([name,p])=>{
    const el=document.getElementById(`rfp-${name.replace(/\s/g,'_')}`);
    if(el)el.classList.toggle('dead',!p.alive);
  });
}

function rfSetPlayPause(playing){
  const pi=document.getElementById('rfPlayIcon'),pa=document.getElementById('rfPauseIcon');
  if(pi)pi.style.display=playing?'none':'block';
  if(pa)pa.style.display=playing?'block':'none';
}
function rfTogglePlay(){
  if(!rfFrames.length)return;
  rfPlaying=!rfPlaying; rfSetPlayPause(rfPlaying);
  if(rfPlaying){
    if(rfIdx>=rfFrames.length-1)rfIdx=0;
    rfTimer=setInterval(()=>{
      rfIdx++;
      if(rfIdx>=rfFrames.length){rfIdx=rfFrames.length-1;clearInterval(rfTimer);rfPlaying=false;rfSetPlayPause(false);}
      else rfDrawFrame(rfIdx);
    },Math.round(1000/RF_FPS/rfSpeed));
  }else clearInterval(rfTimer);
}
function rfSetSpeed(s,btn){rfSpeed=s;document.querySelectorAll('.rfs').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(rfPlaying){clearInterval(rfTimer);rfPlaying=false;rfTogglePlay();}}
function rfSkipBack(){clearInterval(rfTimer);rfPlaying=false;rfSetPlayPause(false);rfIdx=0;rfDrawFrame(0);}
function rfSkipFwd(){clearInterval(rfTimer);rfPlaying=false;rfSetPlayPause(false);rfIdx=rfFrames.length-1;rfDrawFrame(rfIdx);}
function rfStepBack(){clearInterval(rfTimer);rfPlaying=false;rfSetPlayPause(false);rfIdx=Math.max(0,rfIdx-5);rfDrawFrame(rfIdx);}
function rfStepFwd(){clearInterval(rfTimer);rfPlaying=false;rfSetPlayPause(false);rfIdx=Math.min(rfFrames.length-1,rfIdx+5);rfDrawFrame(rfIdx);}
function rfSeek(e){const rect=document.getElementById('rfTimeline').getBoundingClientRect();const pct=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width));rfIdx=Math.round(pct*(rfFrames.length-1));rfDrawFrame(rfIdx);}
</script>
