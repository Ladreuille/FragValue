<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FragValue — Résultats démo</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0C0E13;--surface:#131620;--card:#191D27;--border:#252A38;--accent:#3B7FF5;--accent-dim:rgba(59,127,245,.12);--text:#EDF0F7;--text2:#8892A4;--text3:#4A5568;--success:#2DD4A0;--danger:#F06B6B;--gold:#F5C842;--font:'Instrument Sans',sans-serif;--mono:'JetBrains Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;background:rgba(12,14,19,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .logo{font-size:16px;font-weight:700;letter-spacing:-.2px;text-decoration:none;color:var(--text)}
    .logo-accent{color:var(--accent)}
    .nav-link{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;font-weight:500}
    .nav-link:hover{color:var(--text);background:var(--card)}
    .page{max-width:1200px;margin:0 auto;padding:28px 32px 80px}
    .section-label{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--text3);text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:10px}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .no-data{text-align:center;padding:80px 24px}
    .no-data-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
    .no-data-sub{font-size:13px;color:var(--text2);margin-bottom:24px;font-family:var(--mono)}
    .no-data-btn{display:inline-block;background:var(--accent);color:#fff;padding:11px 24px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;text-decoration:none}
    .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
    .meta-item{text-align:center}
    .meta-val{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--accent);font-family:var(--mono);line-height:1}
    .meta-label{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
    .stat-label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin-bottom:7px;font-family:var(--mono)}
    .stat-val{font-size:22px;font-weight:700;letter-spacing:-.8px;font-family:var(--mono);line-height:1}
    .stat-sub{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
    .c-accent{color:var(--accent)}.c-good{color:var(--success)}.c-warn{color:var(--gold)}.c-neutral{color:var(--text)}
    .heatmap-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content;flex-wrap:wrap}
    .heatmap-tab{font-family:var(--mono);font-size:12px;font-weight:500;padding:7px 14px;border-radius:6px;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .15s}
    .heatmap-tab.active{background:var(--card);color:var(--text);border:1px solid var(--border)}
    .floor-toggle{display:none;gap:4px;margin-bottom:10px;align-items:center}
    .floor-toggle.visible{display:flex}
    .floor-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;color:var(--text2);border:1px solid var(--border);background:transparent;transition:all .15s}
    .floor-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(59,127,245,.4)}
    .canvas-wrap{display:grid;grid-template-columns:1fr 210px;gap:14px;align-items:start}
    @media(max-width:700px){.canvas-wrap{grid-template-columns:1fr}}
    .canvas-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
    #heatmapCanvas{width:100%;height:auto;border-radius:6px;display:block}
    .map-notice{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px;text-align:center}
    .legend{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--text3)}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .player-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
    .panel-label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;font-family:var(--mono)}
    .player-btn{width:100%;text-align:left;padding:8px 10px;border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--text2);border:1px solid transparent;background:transparent;cursor:pointer;transition:all .15s;margin-bottom:3px;display:flex;align-items:center;gap:7px}
    .player-btn:hover{border-color:var(--border);color:var(--text)}
    .player-btn.active{border-color:rgba(255,255,255,.1);color:var(--text);background:rgba(255,255,255,.04)}
    .p-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .p-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .p-kd{font-size:10px;color:var(--text3);flex-shrink:0}
    .p-star{color:var(--gold);font-size:10px}
    .export-btn{width:100%;font-family:var(--mono);font-size:11px;padding:7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;margin-top:8px}
    .export-btn:hover{border-color:var(--accent);color:var(--accent)}
    .compare-btn{width:100%;font-family:var(--mono);font-size:11px;padding:7px;border-radius:6px;border:1px solid rgba(45,212,160,.3);background:rgba(45,212,160,.06);color:var(--success);cursor:pointer;transition:all .15s;margin-top:6px}
    .compare-btn:hover{border-color:var(--success);background:rgba(45,212,160,.12)}
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:20px}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:380px}
    th{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card);letter-spacing:.5px;font-weight:500}
    td{padding:9px 14px;border-bottom:1px solid rgba(37,42,56,.5);font-family:var(--mono);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.015)}
    .td-name{color:var(--text);font-weight:500}
    .td-good{color:var(--success)}.td-bad{color:var(--danger)}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Frag<span class="logo-accent">Value</span></a>
  <div>
    <a href="demo.html" class="nav-link">Nouvelle démo</a>
    <a href="compare.html" class="nav-link">Comparer</a>
    <a href="index.html" class="nav-link">Scout</a>
  </div>
</nav>

<div id="noData" class="no-data" style="display:none">
  <div class="no-data-title">Aucune démo analysée</div>
  <p class="no-data-sub">Importe d'abord une démo depuis la page d'analyse.</p>
  <a href="demo.html" class="no-data-btn">Analyser une démo</a>
</div>

<div class="page" id="mainContent" style="display:none">
  <div class="section-label">Résultats de l'analyse</div>
  <div class="meta-card" id="metaCard"></div>

  <div class="section-label">Stats clés</div>
  <div class="stats-grid" id="statsGrid"></div>

  <div class="section-label">Heatmaps</div>
  <div class="heatmap-tabs">
    <button class="heatmap-tab active" onclick="switchHeatmap('kills',this)">Kills</button>
    <button class="heatmap-tab" onclick="switchHeatmap('deaths',this)">Deaths</button>
    <button class="heatmap-tab" onclick="switchHeatmap('movement',this)">Déplacements</button>
    <button class="heatmap-tab" onclick="switchHeatmap('duels',this)">Duel zones</button>
    <button class="heatmap-tab" onclick="switchHeatmap('utility',this)">Utility</button>
  </div>

  <div class="floor-toggle" id="floorToggle">
    <span style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-right:4px">Étage :</span>
    <button class="floor-btn active" onclick="switchFloor('upper',this)">Upper</button>
    <button class="floor-btn" onclick="switchFloor('lower',this)">Lower</button>
  </div>

  <div class="canvas-wrap">
    <div class="canvas-card">
      <canvas id="heatmapCanvas" width="1024" height="1024"></canvas>
      <div class="map-notice" id="mapNotice"></div>
      <div class="legend" id="mapLegend"></div>
    </div>
    <div class="player-panel">
      <div class="panel-label">Joueur</div>
      <div id="playerList"></div>
      <button class="export-btn" onclick="exportHeatmap()">↓ Exporter PNG</button>
      <button class="compare-btn" onclick="goCompare()">⇄ Comparer joueurs</button>
    </div>
  </div>

  <div class="section-label">Classement joueurs</div>
  <div class="table-card">
    <table>
      <thead><tr><th style="width:24px"></th><th>Joueur</th><th>K</th><th>D</th><th>K/D</th><th>HS%</th></tr></thead>
      <tbody id="playersTable"></tbody>
    </table>
  </div>
</div>

<script>
// ─── CONFIG MAPS ──────────────────────────────────────────────────────────────
// posX/posY = coin haut-gauche en coords world CS2 | scale = world units par pixel PNG
const MAP_CONFIG = {
  'de_dust2':   { img: 'maps/de_dust2_radar_psd.png',   posX: -2476, posY: 3239, scale: 4.4  },
  'de_mirage':  { img: 'maps/de_mirage_radar_psd.png',  posX: -3230, posY: 1713, scale: 5.0  },
  'de_inferno': { img: 'maps/de_inferno_radar_psd.png', posX: -2087, posY: 3870, scale: 4.9  },
  'de_anubis':  { img: 'maps/de_anubis_radar_psd.png',  posX: -2796, posY: 3328, scale: 5.22 },
  'de_nuke': {
    upper: { img: 'maps/nuke/de_nuke_radar_psd.png',       posX: -3453, posY: 2887, scale: 7.0 },
    lower: { img: 'maps/nuke/de_nuke_lower_radar_psd.png', posX: -3453, posY: 2887, scale: 7.0 },
  },
  'de_ancient': { img: 'maps/de_ancient_radar_psd.png', posX: -2953, posY: 2164, scale: 5.0  },
  'de_overpass':{ img: 'maps/de_overpass_radar_psd.png',posX: -4831, posY: 1781, scale: 5.2  },
};

// ─── COULEURS JOUEURS (5 fixes) ───────────────────────────────────────────────
const PLAYER_COLORS = [
  { solid: '#3B7FF5', rgb: '59,127,245'  },  // bleu
  { solid: '#F06B6B', rgb: '240,107,107' },  // rouge
  { solid: '#2DD4A0', rgb: '45,212,160'  },  // vert
  { solid: '#EDA020', rgb: '237,160,32'  },  // orange
  { solid: '#A76EF5', rgb: '167,110,245' },  // violet
];
const NEUTRAL_COLOR = { solid: '#8892A4', rgb: '136,146,164' };
let playerColorMap = {}; // { playerName: index }

// ─── STATE ────────────────────────────────────────────────────────────────────
let demoData = null, currentPlayer = null, currentHeatmap = 'kills', currentFloor = 'upper';
let canvas, ctx, mapImage = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas = document.getElementById('heatmapCanvas');
  ctx = canvas.getContext('2d');
  const raw = sessionStorage.getItem('demoData');
  if (!raw) { document.getElementById('noData').style.display = 'block'; return; }
  try {
    demoData = JSON.parse(raw);
    document.getElementById('mainContent').style.display = 'block';
    assignPlayerColors();
    // Par défaut : joueur analysé (targetPlayer)
    currentPlayer = demoData.meta?.targetPlayer || null;
    renderMeta();
    renderStats();
    renderPlayerList();
    loadMapImageThenDraw();
  } catch(e) { document.getElementById('noData').style.display = 'block'; }
});

// ─── COULEURS ─────────────────────────────────────────────────────────────────
function assignPlayerColors() {
  // Les 5 premiers joueurs par ordre de playerStats reçoivent une couleur
  const players = demoData.playerStats || [];
  players.slice(0, 5).forEach((p, i) => { playerColorMap[p.name] = i; });
}

function getPlayerColor(name) {
  const idx = playerColorMap[name];
  return idx !== undefined ? PLAYER_COLORS[idx] : NEUTRAL_COLOR;
}

// ─── PROJECTION WORLD CS2 → CANVAS ───────────────────────────────────────────
function w2c(worldX, worldY, mapName, W, H) {
  const cfg = MAP_CONFIG[mapName];
  if (!cfg) return { px: W/2, py: H/2 };
  const c = cfg.upper ? (currentFloor === 'upper' ? cfg.upper : cfg.lower) : cfg;
  // PNG de référence = 1024×1024px, scale en world units/pixel
  const pxRaw = (worldX - c.posX) / c.scale;
  const pyRaw = (c.posY - worldY) / c.scale; // Y inversé en CS2
  // Adapter si le canvas a une taille différente de 1024
  return { px: (pxRaw / 1024) * W, py: (pyRaw / 1024) * H };
}

// ─── CHARGEMENT IMAGE MAP ─────────────────────────────────────────────────────
function getMapImgPath() {
  const mapName = demoData.meta?.map || 'de_dust2';
  const cfg = MAP_CONFIG[mapName];
  if (!cfg) return null;
  if (cfg.upper) return currentFloor === 'upper' ? cfg.upper.img : cfg.lower.img;
  return cfg.img || null;
}

function loadMapImageThenDraw() {
  const mapName = demoData.meta?.map || 'de_dust2';
  const isMultiFloor = !!(MAP_CONFIG[mapName]?.upper);
  document.getElementById('floorToggle').classList.toggle('visible', isMultiFloor);
  const imgPath = getMapImgPath();
  const notice = document.getElementById('mapNotice');
  if (!imgPath) {
    mapImage = null;
    notice.textContent = `Radar PNG non disponible pour ${mapName}`;
    renderHeatmap(); return;
  }
  notice.textContent = '';
  const img = new Image();
  img.onload = () => { mapImage = img; canvas.width = img.width; canvas.height = img.height; renderHeatmap(); };
  img.onerror = () => { mapImage = null; notice.textContent = `Image introuvable : ${imgPath}`; renderHeatmap(); };
  img.src = imgPath;
}

// ─── RENDU PRINCIPAL ──────────────────────────────────────────────────────────
function renderHeatmap() {
  if (!demoData) return;
  const mapName = demoData.meta?.map || 'de_dust2';
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (mapImage) {
    ctx.globalAlpha = 1;
    ctx.drawImage(mapImage, 0, 0, W, H);
    ctx.fillStyle = 'rgba(10,12,18,0.38)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#0A0C12'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(37,42,56,.6)'; ctx.lineWidth = .5;
    for (let i = 1; i < 10; i++) {
      ctx.beginPath(); ctx.moveTo(i*W/10,0); ctx.lineTo(i*W/10,H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*H/10); ctx.lineTo(W,i*H/10); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  if (currentHeatmap === 'kills')         drawKills(mapName, W, H, 'attacker');
  else if (currentHeatmap === 'deaths')   drawKills(mapName, W, H, 'victim');
  else if (currentHeatmap === 'movement') drawMovement(mapName, W, H);
  else if (currentHeatmap === 'duels')    drawDuels(W, H);
  else if (currentHeatmap === 'utility')  drawUtility(mapName, W, H);

  // Label overlay
  const label = { kills:'KILL HEATMAP', deaths:'DEATH HEATMAP', movement:'DÉPLACEMENTS', duels:'DUEL WIN ZONES', utility:'UTILITY MAP' }[currentHeatmap] || '';
  const playerLabel = currentPlayer || 'TOUS LES JOUEURS';
  ctx.fillStyle = 'rgba(12,14,19,.85)'; ctx.fillRect(8, 8, 220, 40);
  ctx.font = '500 11px JetBrains Mono,monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = '#EDF0F7'; ctx.fillText(label, 14, 24);
  if (currentPlayer) { ctx.fillStyle = getPlayerColor(currentPlayer).solid; }
  else { ctx.fillStyle = '#8892A4'; }
  ctx.font = '400 10px JetBrains Mono,monospace';
  ctx.fillText('▶ ' + playerLabel, 14, 40);

  updateLegend();
}

// ─── DRAWS ────────────────────────────────────────────────────────────────────
function drawKills(mapName, W, H, mode) {
  const kills = demoData.kills || [];
  const gs = Math.floor(W / 32);
  const playersToShow = currentPlayer ? [currentPlayer] : Object.keys(playerColorMap);
  playersToShow.forEach(name => {
    const filtered = kills.filter(k => (mode === 'attacker' ? k.attacker : k.victim) === name);
    const color = getPlayerColor(name);
    drawKillSet(filtered, color, mapName, W, H, gs, mode);
  });
}

function drawKillSet(kills, color, mapName, W, H, gs, mode) {
  const grid = {}; let mx = 0;
  kills.forEach(k => {
    const x = mode === 'attacker' ? k.attackerX : k.victimX;
    const y = mode === 'attacker' ? k.attackerY : k.victimY;
    const { px, py } = w2c(x, y, mapName, W, H);
    const key = `${Math.floor(px/gs)}_${Math.floor(py/gs)}`;
    grid[key] = (grid[key]||0) + 1;
    if (grid[key] > mx) mx = grid[key];
  });
  Object.entries(grid).forEach(([key, count]) => {
    const [gx, gy] = key.split('_').map(Number);
    ctx.fillStyle = `rgba(${color.rgb},${.15 + (count/mx) * .5})`;
    ctx.fillRect(gx*gs, gy*gs, gs, gs);
  });
  kills.forEach(k => {
    const x = mode === 'attacker' ? k.attackerX : k.victimX;
    const y = mode === 'attacker' ? k.attackerY : k.victimY;
    const { px, py } = w2c(x, y, mapName, W, H);
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2);
    ctx.fillStyle = color.solid; ctx.fill();
    ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${color.rgb},.12)`; ctx.fill();
  });
}

function drawMovement(mapName, W, H) {
  const positions = demoData.positions || {};
  const gs = Math.floor(W / 40);
  const playersToShow = currentPlayer ? [currentPlayer] : Object.keys(playerColorMap);
  playersToShow.forEach(name => {
    const pts = positions[name] || [];
    const color = getPlayerColor(name);
    const grid = {}; let mx = 0;
    pts.forEach(p => {
      const { px, py } = w2c(p.x, p.y, mapName, W, H);
      const key = `${Math.floor(px/gs)}_${Math.floor(py/gs)}`;
      grid[key] = (grid[key]||0) + 1;
      if (grid[key] > mx) mx = grid[key];
    });
    Object.entries(grid).forEach(([key, count]) => {
      const [gx, gy] = key.split('_').map(Number);
      ctx.fillStyle = `rgba(${color.rgb},${.08 + (count/mx) * .6})`;
      ctx.fillRect(gx*gs, gy*gs, gs, gs);
    });
  });
}

function drawDuels(W, H) {
  const zones = demoData.duelZones || [];
  const GRID = 10, cs = W / GRID;
  zones.forEach(z => {
    const total = z.kills + z.deaths;
    if (total === 0) return;
    const wr = parseFloat(z.winRate);
    const color = wr >= 65 ? `rgba(45,212,160,${.2+wr/100*.45})` : wr >= 45 ? `rgba(245,200,66,.4)` : `rgba(240,107,107,${.2+(100-wr)/100*.45})`;
    const px = z.col * cs, py = (GRID-1-z.row) * cs;
    ctx.fillStyle = color; ctx.fillRect(px, py, cs, cs);
    if (total >= 2) {
      ctx.fillStyle='rgba(237,240,247,.9)'; ctx.font=`600 ${Math.floor(cs*.24)}px JetBrains Mono,monospace`; ctx.textAlign='center';
      ctx.fillText(wr+'%', px+cs/2, py+cs/2+3);
      ctx.font=`${Math.floor(cs*.16)}px JetBrains Mono,monospace`; ctx.fillStyle='rgba(237,240,247,.5)';
      ctx.fillText(total+' duels', px+cs/2, py+cs/2+cs*.22);
    }
  });
}

function drawUtility(mapName, W, H) {
  let g = demoData.grenades || [];
  if (currentPlayer) g = g.filter(x => x.thrower === currentPlayer);
  const C = {'weapon_flashbang':'rgba(245,200,66,.9)','weapon_smokegrenade':'rgba(45,212,160,.8)','weapon_hegrenade':'rgba(240,107,107,.85)','weapon_molotov':'rgba(237,160,32,.85)','weapon_incgrenade':'rgba(237,160,32,.85)'};
  g.forEach(x => {
    const { px, py } = w2c(x.startX, x.startY, mapName, W, H);
    const color = C[x.type] || 'rgba(138,146,164,.6)';
    ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.fillStyle=color.replace(/[\d.]+\)$/,'0.2)'); ctx.fill();
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fillStyle=color; ctx.fill();
    ctx.strokeStyle='rgba(237,240,247,.25)'; ctx.lineWidth=1; ctx.stroke();
  });
}

// ─── LEGEND ───────────────────────────────────────────────────────────────────
function updateLegend() {
  let items = [];
  if (currentHeatmap === 'utility') {
    items = [{color:'rgba(245,200,66,.9)',label:'Flash'},{color:'rgba(45,212,160,.8)',label:'Smoke'},{color:'rgba(240,107,107,.85)',label:'HE'},{color:'rgba(237,160,32,.85)',label:'Molotov'}];
  } else if (currentHeatmap === 'duels') {
    items = [{color:'#2DD4A0',label:'>65% win'},{color:'#F5C842',label:'45-65%'},{color:'#F06B6B',label:'<45%'}];
  } else {
    const shown = currentPlayer ? [currentPlayer] : Object.keys(playerColorMap);
    items = shown.map(name => ({ color: getPlayerColor(name).solid, label: name }));
  }
  document.getElementById('mapLegend').innerHTML = items.map(i =>
    `<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}</div>`
  ).join('');
}

// ─── META / STATS / PLAYERS ───────────────────────────────────────────────────
function renderMeta() {
  const m = demoData.meta;
  document.getElementById('metaCard').innerHTML = `
    <div class="meta-item"><div class="meta-val">${m.map||'—'}</div><div class="meta-label">Map</div></div>
    <div class="meta-item"><div class="meta-val">${m.rounds||0}</div><div class="meta-label">Rounds</div></div>
    <div class="meta-item"><div class="meta-val">${m.totalKills||0}</div><div class="meta-label">Kills totaux</div></div>
    <div class="meta-item"><div class="meta-val">${m.players?m.players.length:0}</div><div class="meta-label">Joueurs</div></div>
    ${m.targetPlayer?`<div class="meta-item"><div class="meta-val" style="font-size:16px;color:var(--gold)">${m.targetPlayer}</div><div class="meta-label">Analysé</div></div>`:''}`;
}

function renderStats() {
  const kills = demoData.kills || [];
  const playerKills = currentPlayer ? kills.filter(k => k.attacker === currentPlayer) : kills;
  const hs = playerKills.filter(k => k.isHeadshot).length;
  const hsPct = playerKills.length > 0 ? ((hs/playerKills.length)*100).toFixed(0) : 0;
  const grenades = (demoData.grenades||[]).filter(g => !currentPlayer || g.thrower === currentPlayer);
  document.getElementById('statsGrid').innerHTML = [
    {label:'Kills',       val:playerKills.length,                         sub:'dans la démo',   cls:'c-accent'},
    {label:'Headshot %',  val:hsPct+'%',                                  sub:hs+' HS',         cls:'c-good'},
    {label:'Wallbangs',   val:playerKills.filter(k=>k.isWallbang).length, sub:'à travers murs', cls:'c-warn'},
    {label:'Thru smoke',  val:playerKills.filter(k=>k.thruSmoke).length,  sub:'kills smoke',    cls:'c-accent'},
    {label:'Rounds',      val:(demoData.rounds||[]).length,                sub:'joués',          cls:'c-neutral'},
    {label:'Grenades',    val:grenades.length,                            sub:'lancées',         cls:'c-accent'},
  ].map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-val ${s.cls}">${s.val}</div><div class="stat-sub">${s.sub}</div></div>`).join('');
}

function renderPlayerList() {
  const players = demoData.playerStats || [];
  const target = demoData.meta?.targetPlayer || null;
  const list = document.getElementById('playerList');

  list.innerHTML = `<button class="player-btn ${!currentPlayer?'active':''}" onclick="selectPlayer(null,this)">
    <span class="p-dot" style="background:var(--border)"></span>
    <span class="p-name" style="color:var(--text2)">Tous les joueurs</span>
  </button>`;

  players.slice(0, 10).forEach(p => {
    const c = getPlayerColor(p.name);
    const isActive = p.name === currentPlayer;
    const isTarget = p.name === target;
    list.innerHTML += `<button class="player-btn ${isActive?'active':''}" onclick="selectPlayer('${p.name.replace(/'/g,"\\'")}',this)">
      <span class="p-dot" style="background:${c.solid}"></span>
      <span class="p-name">${p.name.substring(0,15)}</span>
      ${isTarget ? '<span class="p-star">★</span>' : ''}
      <span class="p-kd">${p.kd}</span>
    </button>`;
  });

  // Table
  document.getElementById('playersTable').innerHTML = players.map(p => {
    const kd = parseFloat(p.kd);
    const cl = kd >= 1.3 ? 'td-good' : kd < 1 ? 'td-bad' : '';
    const c = getPlayerColor(p.name);
    const isTarget = p.name === target;
    return `<tr>
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c.solid}"></span></td>
      <td class="td-name">${p.name}${isTarget?' <span style="color:var(--gold);font-size:10px">★</span>':''}</td>
      <td>${p.kills}</td><td>${p.deaths}</td>
      <td class="${cl}">${p.kd}</td>
      <td>${p.hsPct}%</td>
    </tr>`;
  }).join('');
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function selectPlayer(name, btn) {
  currentPlayer = name;
  document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStats();
  renderHeatmap();
}

function switchHeatmap(type, btn) {
  currentHeatmap = type;
  document.querySelectorAll('.heatmap-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHeatmap();
}

function switchFloor(floor, btn) {
  currentFloor = floor;
  document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadMapImageThenDraw();
}

function exportHeatmap() {
  const link = document.createElement('a');
  link.download = `fragvalue-${currentHeatmap}-${currentPlayer||'all'}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function goCompare() {
  const players = demoData.playerStats || [];
  if (players.length < 2) return alert('Pas assez de joueurs dans la démo.');
  const params = players.slice(0,5).map(p => `p=${encodeURIComponent(p.name)}`).join('&');
  window.location.href = `compare.html?${params}`;
}
</script>
</body>
</html>
