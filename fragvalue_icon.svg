<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FragValue">
  <title>FragValue</title>
  <defs>
    <linearGradient id="fvBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1210"/>
      <stop offset="100%" stop-color="#070808"/>
    </linearGradient>
    <linearGradient id="fvLime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8ff57"/>
      <stop offset="100%" stop-color="#7ddd1a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with subtle gradient -->
  <rect width="256" height="256" rx="52" fill="url(#fvBg)"/>

  <!-- Tactical reticle brackets : 4 corners (evoque une lunette CS2) -->
  <g stroke="url(#fvLime)" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M 36 62 L 36 36 L 62 36"/>
    <path d="M 194 36 L 220 36 L 220 62"/>
    <path d="M 36 194 L 36 220 L 62 220"/>
    <path d="M 194 220 L 220 220 L 220 194"/>
  </g>

  <!-- F blanc : vertical bar + 2 horizontal bars (Anton-inspired, geometric) -->
  <g fill="#f0f2f2">
    <rect x="72" y="76" width="22" height="104" rx="2"/>
    <rect x="72" y="76" width="56" height="22" rx="2"/>
    <rect x="72" y="120" width="44" height="20" rx="2"/>
  </g>

  <!-- V lime : single stroke with 2 diagonals meeting at bottom -->
  <path d="M 148 76 L 180 172 L 212 76"
        stroke="url(#fvLime)" stroke-width="22" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Micro crosshair center dot (tactical detail) -->
  <circle cx="128" cy="128" r="2.5" fill="url(#fvLime)" opacity="0.7"/>
</svg>
