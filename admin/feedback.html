<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/fragvalue_icon.svg" type="image/svg+xml">
<title>FragValue · Admin · Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080909;--surface:#0f1010;--card:#131414;--border:#1c1e1e;--border2:#252727;
  --accent:#b8ff57;--accent2:#7ddd1a;
  --text:#e8eaea;--text2:#7a8080;--text3:#4a5050;
  --success:#2dd4a0;--danger:#ff4444;--gold:#f5c842;--orange:#ff8a3d;
  --mono:'Space Mono',monospace;--display:'Anton',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;font-size:13px}
.page{max-width:1200px;margin:0 auto;padding:40px 32px 80px}
@media(max-width:768px){.page{padding:24px 16px}}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{font-family:var(--display);font-size:22px;color:var(--text);letter-spacing:.04em;text-decoration:none}
.logo span{color:var(--accent)}
.admin-tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);padding:3px 9px;border-radius:40px;font-weight:700}
.topbar a{font-family:var(--mono);font-size:11px;color:var(--text2);text-decoration:none;letter-spacing:.06em;text-transform:uppercase}
.topbar a:hover{color:var(--accent)}

h1{font-family:var(--display);font-size:32px;letter-spacing:.02em;line-height:1;margin-bottom:8px}
h1 span{color:var(--accent)}
.page-sub{font-size:12px;color:var(--text2);margin-bottom:28px;line-height:1.6;max-width:640px}

.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px}
.stat-card:hover{border-color:rgba(184,255,87,.25)}
.stat-card.active{border-color:var(--accent);background:linear-gradient(180deg,rgba(184,255,87,.06),var(--surface))}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.stat-val{font-family:var(--display);font-size:30px;line-height:1}
.stat-val.positive{color:var(--accent)}
.stat-val.negative{color:var(--danger)}
.stat-val.idea{color:var(--gold)}
.stat-val.bug{color:var(--orange)}
.stat-val.all{color:var(--text)}
.stat-sub{font-size:10px;color:var(--text3);letter-spacing:.04em}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar-title{font-family:var(--display);font-size:18px;letter-spacing:.02em;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:700;padding:7px 12px;border-radius:6px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .15s}
.btn:hover{color:var(--accent);border-color:rgba(184,255,87,.4)}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.08);color:#000}

.feedback-list{display:flex;flex-direction:column;gap:10px}
.fb-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:border-color .15s;scroll-margin-top:80px}
.fb-item:hover{border-color:var(--border2)}
.fb-item.highlight{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.fb-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.fb-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1;min-width:0}
.fb-pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:40px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.fb-pill.positive{background:rgba(184,255,87,.1);color:var(--accent);border:1px solid rgba(184,255,87,.25)}
.fb-pill.negative{background:rgba(255,68,68,.1);color:var(--danger);border:1px solid rgba(255,68,68,.25)}
.fb-pill.idea{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
.fb-pill.bug{background:rgba(255,138,61,.1);color:var(--orange);border:1px solid rgba(255,138,61,.25)}
.fb-pill.new{background:rgba(184,255,87,.05);color:var(--accent);border:1px dashed rgba(184,255,87,.3)}
.fb-pill.read{background:rgba(122,128,128,.08);color:var(--text2);border:1px solid var(--border2)}
.fb-pill.responded{background:rgba(45,212,160,.1);color:var(--success);border:1px solid rgba(45,212,160,.25)}
.fb-pill.closed{background:rgba(74,80,80,.15);color:var(--text3);border:1px solid var(--border2)}
.fb-pill.tier-pro{background:rgba(184,255,87,.06);color:var(--accent);border:1px solid rgba(184,255,87,.18)}
.fb-pill.tier-team{background:rgba(245,200,66,.08);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.fb-pill.tier-free{background:rgba(122,128,128,.05);color:var(--text3);border:1px solid var(--border2)}
.fb-email{font-family:var(--mono);font-size:11px;color:var(--text)}
.fb-email.anon{color:var(--text3);font-style:italic}
.fb-date{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap}
.fb-msg{font-size:13px;color:var(--text);line-height:1.55;white-space:pre-wrap;background:var(--card);border-left:2px solid var(--border2);border-radius:0 6px 6px 0;padding:12px 14px;margin:8px 0 12px}
.fb-msg.positive{border-left-color:var(--accent)}
.fb-msg.negative{border-left-color:var(--danger)}
.fb-msg.idea{border-left-color:var(--gold)}
.fb-msg.bug{border-left-color:var(--orange)}
.fb-context{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:10px;display:flex;gap:14px;flex-wrap:wrap}
.fb-context a{color:var(--text2);text-decoration:none}
.fb-context a:hover{color:var(--accent)}
.fb-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-top:10px;border-top:1px solid var(--border)}
.fb-action{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:9px;font-weight:700;padding:6px 12px;border-radius:6px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s}
.fb-action:hover{color:var(--accent);border-color:rgba(184,255,87,.4)}
.fb-action.danger:hover{color:var(--danger);border-color:rgba(255,68,68,.4)}

.fb-response-area{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.fb-response-textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;border-radius:6px;resize:vertical;min-height:70px;outline:none;line-height:1.5}
.fb-response-textarea:focus{border-color:rgba(184,255,87,.4)}
.fb-response-saved{background:var(--card);border-left:2px solid var(--success);border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.55;margin-top:6px}
.fb-response-saved-label{font-size:9px;color:var(--success);letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:4px;display:block}

.empty,.loading,.denied{text-align:center;padding:80px 24px;color:var(--text2);font-size:13px}
.denied h2{font-family:var(--display);font-size:28px;color:var(--danger);margin-bottom:8px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid rgba(184,255,87,.3);color:var(--text);padding:12px 20px;border-radius:8px;z-index:100;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:440px;text-align:center}
.toast.err{border-color:rgba(255,68,68,.4);color:#ff8a8a}
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="logo">Frag<span>Value</span></a>
      <span class="admin-tag">● Admin</span>
    </div>
    <a href="/dashboard.html">← Dashboard</a>
  </div>

  <div id="content">
    <div class="loading">Verification des droits...</div>
  </div>
</div>

<script>
const SB_URL  = 'https://xmyruycvvkmcwysfygcq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXJ1eWN2dmttY3d5c2Z5Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQzMzcsImV4cCI6MjA4OTUzMDMzN30.TaPIaI7puA3qnIrkHQ-VL9o9QgegmOjJR8yYVYsi8oI';
const sb = supabase.createClient(SB_URL, SB_ANON);

let session = null;
let allData = { feedbacks: [], stats: { by_type: {}, by_status: {}, total: 0, new_count: 0 } };
let typeFilter = null;
let statusFilter = null;

const TYPE_LABELS = {
  positive: 'Positif',
  negative: 'Negatif',
  idea: 'Idee',
  bug: 'Bug',
};
const STATUS_LABELS = {
  new: 'Nouveau',
  read: 'Lu',
  responded: 'Repondu',
  closed: 'Ferme',
};

async function init() {
  const s = await sb.auth.getSession();
  session = s.data.session;
  if (!session) {
    document.getElementById('content').innerHTML =
      '<div class="denied"><h2>403</h2><p>Tu dois etre connecte en admin pour voir cette page.</p><p style="margin-top:16px"><a href="/login.html?redirect=/admin/feedback.html" class="btn primary">Se connecter</a></p></div>';
    return;
  }
  await load();

  // Si l'URL contient un hash (#feedbackId), scroll vers + highlight
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    setTimeout(() => {
      const el = document.getElementById('fb-' + hash);
      if (el) { el.scrollIntoView({ behavior: 'smooth' }); el.classList.add('highlight'); }
    }, 200);
  }
}

async function load() {
  try {
    const params = new URLSearchParams();
    if (typeFilter) params.set('type', typeFilter);
    if (statusFilter) params.set('status', statusFilter);
    const url = '/api/feedback' + (params.toString() ? '?' + params : '');
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + session.access_token },
    });
    if (res.status === 403) {
      document.getElementById('content').innerHTML =
        '<div class="denied"><h2>403</h2><p>Ton compte n\'est pas admin.</p></div>';
      return;
    }
    if (!res.ok) throw new Error('status ' + res.status);
    allData = await res.json();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty">Erreur de chargement : ' + escapeHtml(e.message) + '</div>';
  }
}

function render() {
  const stats = allData.stats || {};
  const byType = stats.by_type || {};
  const byStatus = stats.by_status || {};

  const typeCards = ['positive', 'negative', 'idea', 'bug'].map(t => {
    const isActive = typeFilter === t;
    const n = byType[t] || 0;
    return `
      <div class="stat-card ${isActive ? 'active' : ''}" onclick="toggleType('${t}')">
        <div class="stat-label">${TYPE_LABELS[t]}</div>
        <div class="stat-val ${t}">${n}</div>
        <div class="stat-sub">Cliquer pour ${isActive ? 'tout voir' : 'filtrer'}</div>
      </div>
    `;
  }).join('');

  const allCard = `
    <div class="stat-card ${!typeFilter ? 'active' : ''}" onclick="toggleType(null)">
      <div class="stat-label">Total</div>
      <div class="stat-val all">${stats.total || 0}</div>
      <div class="stat-sub">${stats.new_count || 0} nouveaux</div>
    </div>
  `;

  const items = (allData.feedbacks || []).map(renderItem).join('');

  document.getElementById('content').innerHTML = `
    <h1>Feedback · <span>${stats.total || 0}</span> retours</h1>
    <p class="page-sub">Centralisation des retours utilisateurs (positif / negatif / idees / bugs). Clique un type pour filtrer. Repondre envoie automatiquement un email a l'utilisateur si on a son email.</p>

    <div class="cards-row">${allCard}${typeCards}</div>

    <div class="toolbar">
      <div class="toolbar-title">${typeFilter ? TYPE_LABELS[typeFilter] : 'Tous'}${statusFilter ? ' · ' + STATUS_LABELS[statusFilter] : ''}</div>
      ${statusFilter ? `<button class="btn" onclick="setStatusFilter(null)">${STATUS_LABELS[statusFilter]} ×</button>` : `
        <button class="btn" onclick="setStatusFilter('new')">Nouveaux</button>
        <button class="btn" onclick="setStatusFilter('responded')">Repondus</button>
      `}
      ${typeFilter ? `<button class="btn" onclick="toggleType(null)">Effacer type</button>` : ''}
    </div>

    <div class="feedback-list">${items || '<div class="empty">Aucun feedback pour ce filtre.</div>'}</div>
  `;
}

function renderItem(f) {
  const typeLabel = TYPE_LABELS[f.type] || f.type;
  const statusLabel = STATUS_LABELS[f.status] || f.status;
  const ticket = f.ticket_number ? 'FB-' + String(f.ticket_number).padStart(4, '0') : '';
  const tierPill = f.user_tier ? `<span class="fb-pill tier-${f.user_tier}">${f.user_tier}</span>` : '';
  const emailDisplay = f.user_email
    ? `<span class="fb-email">${escapeHtml(f.user_email)}</span>`
    : '<span class="fb-email anon">anonyme</span>';
  const date = f.created_at ? new Date(f.created_at).toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '-';
  const pageLink = f.page_url ? `<span>Page : <a href="${escapeAttr(f.page_url)}" target="_blank" rel="noopener">${escapeHtml(shortUrl(f.page_url))}</a></span>` : '';
  const viewport = f.viewport ? `<span>Viewport : ${escapeHtml(f.viewport)}</span>` : '';

  const responseBlock = f.admin_response
    ? `<div class="fb-response-area">
         <span class="fb-response-saved-label">Reponse envoyee</span>
         <div class="fb-response-saved">${escapeHtml(f.admin_response)}</div>
       </div>`
    : `<div class="fb-response-area">
         <textarea class="fb-response-textarea" id="resp-${f.id}" placeholder="Repondre a cet utilisateur (envoye par email s'il a fourni son adresse)..." maxlength="2000"></textarea>
       </div>`;

  const respondBtn = f.admin_response ? '' :
    `<button class="fb-action" onclick="sendResponse('${f.id}')">Envoyer reponse</button>`;

  return `
    <div class="fb-item" id="fb-${f.id}">
      <div class="fb-head">
        <div class="fb-meta">
          ${ticket ? `<span style="font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.04em;background:rgba(184,255,87,.06);padding:2px 8px;border-radius:6px;border:1px solid rgba(184,255,87,.2)">${ticket}</span>` : ''}
          <span class="fb-pill ${f.type}">${typeLabel}</span>
          <span class="fb-pill ${f.status}">${statusLabel}</span>
          ${tierPill}
          ${emailDisplay}
        </div>
        <span class="fb-date">${date}</span>
      </div>

      <div class="fb-msg ${f.type}">${escapeHtml(f.message)}</div>

      ${(pageLink || viewport) ? `<div class="fb-context">${pageLink}${viewport}</div>` : ''}

      ${responseBlock}

      <div class="fb-actions">
        ${respondBtn}
        ${f.status !== 'read' && f.status === 'new' ? `<button class="fb-action" onclick="setStatus('${f.id}', 'read')">Marquer comme lu</button>` : ''}
        ${f.status !== 'closed' ? `<button class="fb-action" onclick="setStatus('${f.id}', 'closed')">Fermer</button>` : `<button class="fb-action" onclick="setStatus('${f.id}', 'new')">Reouvrir</button>`}
      </div>
    </div>
  `;
}

function shortUrl(u) {
  try {
    const url = new URL(u);
    return url.pathname + (url.search || '');
  } catch { return u.slice(0, 40); }
}

async function setStatus(id, status) {
  await patch({ id, status });
}

async function sendResponse(id) {
  const ta = document.getElementById('resp-' + id);
  const text = (ta?.value || '').trim();
  if (!text) { showToast('Reponse vide', true); return; }
  if (text.length > 2000) { showToast('Trop long (max 2000)', true); return; }
  await patch({ id, admin_response: text });
}

async function patch(body) {
  try {
    const res = await fetch('/api/feedback', {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur ' + res.status);
    showToast('Mis a jour');
    await load();
  } catch (e) {
    showToast(e.message, true);
  }
}

function toggleType(t) {
  typeFilter = (typeFilter === t || t === null) ? null : t;
  load();
}
function setStatusFilter(s) {
  statusFilter = s;
  load();
}

function showToast(text, isError) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' err' : '');
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function escapeAttr(s) {
  return escapeHtml(s);
}

init();
</script>
</body>
</html>
