<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,follow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin · Business · FragValue</title>
<link rel="icon" href="/fragvalue_icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080909;--surface:#0f1010;--card:#131414;--border:#1c1e1e;--border2:#252727;
  --accent:#b8ff57;--accent2:#7ddd1a;
  --text:#e8eaea;--text2:#7a8080;--text3:#8a9090;
  --success:#2dd4a0;--danger:#ff4444;--warn:#f5c842;
  --mono:'Space Mono',monospace;--display:'Anton',sans-serif;
  --r:6px;--r2:12px
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;padding:24px 16px}
.wrap{max-width:1280px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
h1{font-family:var(--display);font-size:30px;letter-spacing:.02em}
h1 span{color:var(--accent);text-shadow:0 0 16px rgba(184,255,87,.3)}
.subtitle{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--card);color:var(--text2);padding:8px 14px;border-radius:var(--r);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border2);cursor:pointer;transition:all .15s;text-decoration:none}
.btn:hover{border-color:var(--accent);color:var(--accent)}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.kpi.accent{border-color:rgba(184,255,87,.25);background:linear-gradient(180deg,rgba(184,255,87,.04) 0%,transparent 100%)}
.kpi-label{font-size:9.5px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.kpi-val{font-family:var(--display);font-size:32px;color:var(--text);line-height:1}
.kpi-val.accent{color:var(--accent)}
.kpi-val.danger{color:var(--danger)}
.kpi-val.warn{color:var(--warn)}
.kpi-val.success{color:var(--success)}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:6px;line-height:1.5}

.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:22px;margin-bottom:18px}
.section h2{font-family:var(--display);font-size:18px;color:var(--text);margin-bottom:14px;letter-spacing:.04em;text-transform:uppercase}

/* Funnel visualization : steps with diminishing width */
.funnel{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.funnel-step{display:grid;grid-template-columns:160px 1fr 140px;gap:14px;align-items:center;padding:10px 0;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px}
.funnel-step:first-child{border-top:none}
.fs-label{color:var(--text2);font-size:11px;letter-spacing:.04em}
.fs-bar{position:relative;height:28px;background:var(--bg);border-radius:6px;overflow:hidden}
.fs-bar-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding:0 10px;color:#000;font-family:var(--display);font-size:14px}
.fs-meta{text-align:right;font-size:11px;color:var(--text2)}
.fs-drop{font-size:10px;color:var(--danger);margin-top:2px}
.fs-drop.flat{color:var(--text3)}

.loading{text-align:center;padding:60px;color:var(--text3);font-size:12px}
.err{color:var(--danger);background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.3);padding:14px 18px;border-radius:var(--r);font-size:12px;margin-bottom:18px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(184,255,87,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>BUSINESS <span>METRICS</span></h1>
      <div class="subtitle" id="refreshInfo">Chargement...</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="load()">Refresh</button>
      <a href="/admin/dashboard.html" class="btn">Dashboard ops</a>
      <a href="/admin/errors.html" class="btn">Errors</a>
    </div>
  </header>

  <div id="errMsg" class="err" style="display:none"></div>
  <div id="content"><div class="loading"><span class="spinner"></span>Chargement des metriques business...</div></div>
</div>

<script>
(async function(){
  const SUPABASE_URL = 'https://xmyruycvvkmcwysfygcq.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXJ1eWN2dmttY3d5c2Z5Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQzMzcsImV4cCI6MjA4OTUzMDMzN30.TaPIaI7puA3qnIrkHQ-VL9o9QgegmOjJR8yYVYsi8oI';
  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }

  window.load = load;

  async function load() {
    document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Chargement...</div>';
    document.getElementById('errMsg').style.display = 'none';
    try {
      const r = await fetch('/api/admin-business-metrics', {
        headers: { Authorization: 'Bearer ' + session.access_token }
      });
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        throw new Error(`${r.status}: ${t.slice(0,300)}`);
      }
      const data = await r.json();
      render(data);
      document.getElementById('refreshInfo').textContent = 'Maj : ' + new Date().toLocaleTimeString('fr-FR');
    } catch (e) {
      document.getElementById('errMsg').textContent = e.message;
      document.getElementById('errMsg').style.display = 'block';
      document.getElementById('content').innerHTML = '';
    }
  }

  function pct(n) { return (n || 0).toFixed(1) + '%'; }

  function render(d) {
    const au = d.active_users || {};
    const f = d.funnel || {};
    const c = d.churn || {};
    const t = d.trends || {};

    document.getElementById('content').innerHTML = `
      <div class="section">
        <h2>Utilisateurs actifs</h2>
        <div class="kpi-grid">
          <div class="kpi accent">
            <div class="kpi-label">DAU (24h)</div>
            <div class="kpi-val accent">${au.dau || 0}</div>
            <div class="kpi-sub">utilisateurs actifs aujourd'hui</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">WAU (7j)</div>
            <div class="kpi-val">${au.wau || 0}</div>
            <div class="kpi-sub">actifs cette semaine</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">MAU (30j)</div>
            <div class="kpi-val">${au.mau || 0}</div>
            <div class="kpi-sub">actifs ce mois</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Stickiness</div>
            <div class="kpi-val ${au.dau_wau_ratio >= 20 ? 'success' : au.dau_wau_ratio >= 10 ? 'warn' : 'danger'}">${pct(au.dau_wau_ratio)}</div>
            <div class="kpi-sub">DAU/WAU (cible >20%)</div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Funnel d'activation</h2>
        <p style="font-size:11px;color:var(--text3);margin-bottom:14px">De l'inscription a la conversion Pro · cumulative counts</p>
        <div class="funnel">
          ${renderFunnelStep('Inscriptions', f.signups, f.signups, 100, null)}
          ${renderFunnelStep('FACEIT lie', f.faceit_linked, f.signups, f.link_rate, 'link_rate')}
          ${renderFunnelStep('1ere demo parsee', f.first_demo, f.signups, (f.first_demo / Math.max(f.signups, 1)) * 100, 'activation_rate')}
          ${renderFunnelStep('1er diagnostic IA', f.first_diag, f.signups, (f.first_diag / Math.max(f.signups, 1)) * 100, 'diag_rate')}
          ${renderFunnelStep('Conversion Pro/Elite', f.pro_users, f.signups, f.conversion_pct, 'conversion_pct')}
        </div>
      </div>

      <div class="section">
        <h2>Subscriptions & churn (30j)</h2>
        <div class="kpi-grid">
          <div class="kpi accent">
            <div class="kpi-label">Pro actifs</div>
            <div class="kpi-val accent">${c.active_pro || 0}</div>
            <div class="kpi-sub">abonnes courants Pro</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Elite/Team actifs</div>
            <div class="kpi-val">${c.active_elite || 0}</div>
            <div class="kpi-sub">abonnes Elite ou Team</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Resiliations 30j</div>
            <div class="kpi-val ${c.cancel_30d > 0 ? 'danger' : 'success'}">${c.cancel_30d || 0}</div>
            <div class="kpi-sub">cancel_at_period_end=true</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Churn rate</div>
            <div class="kpi-val ${c.churn_pct >= 10 ? 'danger' : c.churn_pct >= 5 ? 'warn' : 'success'}">${pct(c.churn_pct)}</div>
            <div class="kpi-sub">cible <5% / mois</div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Tendances recentes</h2>
        <div class="kpi-grid">
          <div class="kpi">
            <div class="kpi-label">Signups 7j</div>
            <div class="kpi-val">${t.signups_7d || 0}</div>
            <div class="kpi-sub">nouveaux comptes</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Signups 30j</div>
            <div class="kpi-val">${t.signups_30d || 0}</div>
            <div class="kpi-sub">nouveaux comptes</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Conversions 30j</div>
            <div class="kpi-val ${t.conversions_30d > 0 ? 'success' : ''}">${t.conversions_30d || 0}</div>
            <div class="kpi-sub">nouvelles subscriptions Pro/Elite</div>
          </div>
        </div>
      </div>

      <div style="text-align:center;font-size:10px;color:var(--text3);margin-top:24px">
        Genere a ${new Date(d.generated_at).toLocaleString('fr-FR')} · Window ${d.window_days || 30} jours
      </div>
    `;
  }

  function renderFunnelStep(label, value, total, percent, dropKey) {
    const width = Math.max(2, Math.min(100, percent));
    const dropTxt = percent === 100 ? 'TOTAL' : (percent >= 50 ? 'BON' : percent >= 20 ? 'MOYEN' : 'FAIBLE');
    const dropCls = percent === 100 || percent >= 50 ? 'flat' : '';
    return `
      <div class="funnel-step">
        <div class="fs-label">${label}</div>
        <div class="fs-bar">
          <div class="fs-bar-fill" style="width:${width}%">${value || 0}</div>
        </div>
        <div class="fs-meta">
          ${pct(percent)} <span class="fs-drop ${dropCls}">${dropTxt}</span>
        </div>
      </div>
    `;
  }

  await load();
})();
</script>
</body>
</html>
